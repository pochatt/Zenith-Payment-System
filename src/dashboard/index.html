<!-- Main Content -->

<!-- TX Timeline Modal -->

  <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <div>
        <div class="text-sm font-semibold text-gray-700">取引タイムライン</div>

      </div>

    </div>

<script>
const BASE = location.origin;
const CRON_SECRET = 'zenith-cron-secret';
let banks = [], currentPage = 'overview';
const PAGE_TITLES = { overview:'総覧', transfer:'送金', bank:'銀行管理', htlc:'HTLC 条件付き送金', gtid:'GTID 協調送金', dns:'DNS清算', ops:'運用操作', liquidity:'流動性モニター', network:'ネットワークグラフ', simulator:'シミュレーター', cases:'ケース管理', trace:'イベントトレース', apispec:'API仕様書', acctverify:'事前口座確認', proxy:'Proxyディレクトリ', creditnotify:'入金結果通知', qrcode:'QRコード送金', crossborder:'クロスボーダー送金', edi:'EDI/リッチデータ' };

// ========== Helpers ==========
async function api(method, path, body, headers = {}) {
  const opts = { method, headers: { 'Content-Type': 'application/json', ...headers } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  return r.json();
}
function tellerH(bankId) { return { 'X-Bank-Id': bankId, 'X-Teller-Id': 'TELLER-1' }; }
function cronH() { return { 'X-Cron-Secret': CRON_SECRET }; }
function uuid() { return crypto.randomUUID(); }

function toast(msg, type = 'info') {
  const colors = { error: 'border-red-400 bg-red-50', success: 'border-emerald-400 bg-emerald-50', info: 'border-amber-400 bg-amber-50' };
  const d = document.createElement('div');
  d.className = `slide-in border-l-4 ${colors[type]||colors.info} bg-white shadow-lg rounded px-4 py-3 text-sm max-w-sm`;
  d.textContent = msg;
  document.getElementById('toast').appendChild(d);
  setTimeout(() => d.remove(), 4000);
}

function badge(state) {
  const m = {
    'SETTLED':'bg-emerald-100 text-emerald-700','NORMAL':'bg-emerald-100 text-emerald-700','OK':'bg-emerald-100 text-emerald-700',
    'MATCH':'bg-emerald-100 text-emerald-700','CREATED':'bg-emerald-100 text-emerald-700',
    'DECIDED_TO_SETTLE':'bg-blue-100 text-blue-700','H_RESERVED':'bg-blue-100 text-blue-700','PRECHECKED':'bg-blue-100 text-blue-700',
    'HTLC_LOCKED':'bg-blue-100 text-blue-700','HTLC_FULFILL_REQUESTED':'bg-indigo-100 text-indigo-700',
    'GT_DECIDED_TO_SETTLE':'bg-blue-100 text-blue-700','GT_PRECHECKED':'bg-blue-100 text-blue-700',
    'GT_SETTLED':'bg-emerald-100 text-emerald-700','LEG_SETTLED':'bg-emerald-100 text-emerald-700',
    'RECEIVED':'bg-amber-100 text-amber-700','PROCESSING':'bg-amber-100 text-amber-700','HTLC_RECEIVED':'bg-amber-100 text-amber-700',
    'GT_RECEIVED':'bg-amber-100 text-amber-700','CUSTODY':'bg-amber-100 text-amber-700','FROZEN':'bg-amber-100 text-amber-700',
    'EXECUTED':'bg-amber-100 text-amber-700','RESERVED':'bg-amber-100 text-amber-700',
    'LEG_REGISTERED':'bg-amber-100 text-amber-700','LEG_READY_CHECKED':'bg-blue-100 text-blue-700',
    'LEG_PAYER_CONFIRMED':'bg-blue-100 text-blue-700','LEG_PAYEE_CONFIRMED':'bg-blue-100 text-blue-700',
    'DECIDED_CANCEL':'bg-red-100 text-red-700','CANCELLED':'bg-red-100 text-red-700','FAILED_EXECUTION':'bg-red-100 text-red-700',
    'SUSPENDED':'bg-red-100 text-red-700','CLOSED':'bg-red-100 text-red-700',
    'GT_DECIDED_CANCEL':'bg-red-100 text-red-700','GT_CANCELLED':'bg-red-100 text-red-700','GT_FAILED':'bg-red-100 text-red-700',
    'LEG_FAILED':'bg-red-100 text-red-700','LEG_SUSPENDED':'bg-red-100 text-red-700',
  };
  const cls = m[state] || 'bg-gray-100 text-gray-600';
  return `<span class="inline-block rounded-full px-2.5 py-0.5 text-[11px] font-medium ${cls}">${state}</span>`;
}

function fmtAmt(v) { return Number(v).toLocaleString('ja-JP') + ' 円'; }
function fmtDate(s) { return s ? s.replace('T', ' ').replace('Z','').slice(0, 23) : '-'; }
function bankName(id) { const b = banks.find(x => x.bank_id === id); return b ? b.bank_name : id || '-'; }

function card(title, body, extra = '') {
  return `<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 mb-4 fade-in ${extra}"><h3 class="font-medium text-gray-700 text-sm mb-4 pb-2 border-b border-gray-100">${title}</h3>${body}</div>`;
}

function subnav(id, items) {
  return `<div id="${id}" class="flex border-b border-gray-200 mb-4 gap-0">${items.map((it,i) =>
    `<button data-tab="${it.key}" class="px-4 py-2 text-sm border-b-2 ${i===0?'border-brand-500 text-brand-600':'border-transparent text-gray-400 hover:text-gray-600'} transition-colors">${it.label}</button>`
  ).join('')}</div>`;
}

function bindSubnav(navId, callback) {
  document.querySelectorAll(`#${navId} button`).forEach(b => b.onclick = () => {
    document.querySelectorAll(`#${navId} button`).forEach(x => { x.classList.remove('border-brand-500','text-brand-600'); x.classList.add('border-transparent','text-gray-400'); });
    b.classList.add('border-brand-500','text-brand-600'); b.classList.remove('border-transparent','text-gray-400');
    callback(b.dataset.tab);
  });
}

// ========== Pages ==========
async function loadBanks() { const r = await api('GET', '/api/banks'); banks = r.banks || []; }

async function renderPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => {
    const isActive = b.dataset.page === page;
    b.classList.toggle('bg-brand-50', isActive);
    b.classList.toggle('text-brand-600', isActive);
    b.classList.toggle('border-brand-500', isActive);
    b.classList.toggle('font-medium', isActive);
    b.classList.toggle('text-gray-600', !isActive);
    b.classList.toggle('border-transparent', !isActive);
  });
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  const app = document.getElementById('app');
  app.innerHTML = '<div class="text-center py-16 text-gray-400 text-sm">読み込み中...</div>';
  await loadBanks();
  switch(page) {
    case 'overview': return renderOverview();
    case 'transfer': return renderTransfer();
    case 'bank': return renderBankMgmt();
    case 'htlc': return renderHtlc();
    case 'gtid': return renderGtid();
    case 'dns': return renderDns();
    case 'ops': return renderOps();
    case 'liquidity': return renderLiquidity();
    case 'network':   return renderNetwork();
    case 'simulator': return renderSimulator();
    case 'cases':     return renderCases();
    case 'trace':     return renderTrace();
    case 'apispec':   return renderApiSpec();
    case 'acctverify': return renderAcctVerify();
    case 'proxy': return renderProxy();
    case 'creditnotify': return renderCreditNotify();
    case 'qrcode': return renderQrCode();
    case 'crossborder': return renderCrossBorder();
    case 'edi': return renderEdi();
  }
}

// ---------- Overview ----------
const laneLabel = l => ({'EXPRESS':'即時','STANDARD':'通常','BULK':'一括','HIGH_VALUE':'大口','HTLC':'HTLC','RTP':'請求払','GTID':'協調(GTID)','DEFERRED':'協調(leg)'})[l] || l;

async function renderOverview(q = {}) {
  const page = q.page || 1;
  const limit = 50;
  const offset = (page - 1) * limit;
  const params = new URLSearchParams({ limit: limit.toString(), offset: offset.toString() });
  if (q.txid)     params.set('txid',      q.txid);
  if (q.account)  params.set('account',   q.account);
  if (q.dateFrom) params.set('date_from', q.dateFrom + 'T00:00:00Z');
  if (q.dateTo)   params.set('date_to',   q.dateTo   + 'T23:59:59Z');

  const [txRes, dnsRes, gtidRes] = await Promise.all([
    api('GET', '/api/transactions?' + params.toString()),
    api('GET', `/api/dns/${new Date().toISOString().slice(0,10)}/status`),
    q.txid ? Promise.resolve({ gtids: [], total_count: 0 }) : api('GET', `/api/gtid?limit=${limit}&offset=${offset}`),
  ]);
  // GTID は GtidTransactions テーブル（Transactions テーブルとは別管理）なので統合して表示
  const regularTxs = txRes.transactions || [];
  const gtidRows = (gtidRes.gtids || [])
    .filter(g => !q.account || g.initiator_bank_id === (q.account.slice(0,3)) )
    .map(g => ({
      txid: g.gtid, lane: 'GTID', state: g.state,
      amount_value: g.total_amount, payer_bank_id: g.initiator_bank_id,
      payer_account_hash: null, payee_bank_id: null,
      payee_account_hash: `${g.leg_count}leg`, created_at: g.created_at,
    }));
  const txs = [...regularTxs, ...gtidRows]
    .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''))
    .slice(0, limit);

  const totalTxs = (txRes.total_count || txs.length) + (gtidRes.total_count || 0);
  const maxPage = Math.max(1, Math.ceil(totalTxs / limit));

  const searchHtml = `
    <div class="bg-white border border-gray-200 rounded-lg p-3 mb-4 flex flex-wrap items-end gap-2 text-sm">
      <div class="flex flex-col gap-0.5">
        <label class="text-[10px] text-gray-400">取引ID（前方一致）</label>
        <input id="ovTxid" type="text" placeholder="TX-..." value="${q.txid||''}"
          class="border border-gray-200 rounded px-2 py-1 text-xs w-48 font-mono">
      </div>
      <div class="flex flex-col gap-0.5">
        <label class="text-[10px] text-gray-400">口座番号（仕向/被仕向）</label>
        <input id="ovAccount" type="text" placeholder="0010000001" value="${q.account||''}"
          class="border border-gray-200 rounded px-2 py-1 text-xs w-36 font-mono">
      </div>
      <div class="flex flex-col gap-0.5">
        <label class="text-[10px] text-gray-400">取引日（From）</label>
        <input id="ovDateFrom" type="date" value="${q.dateFrom||''}"
          class="border border-gray-200 rounded px-2 py-1 text-xs">
      </div>
      <div class="flex flex-col gap-0.5">
        <label class="text-[10px] text-gray-400">取引日（To）</label>
        <input id="ovDateTo" type="date" value="${q.dateTo||''}"
          class="border border-gray-200 rounded px-2 py-1 text-xs">
      </div>
      <button onclick="doOverviewSearch()" class="bg-brand-500 hover:bg-brand-600 text-white px-3 py-1.5 rounded text-xs">検索</button>

async function loadAccounts(bankSelId, acctSelId) {
  const bankId = document.getElementById(bankSelId).value;

async function lookupName() {
  const acct = document.getElementById('txPayeeAcct').value.trim();
  if (acct.length !== 10) { document.getElementById('txPayeeName').innerHTML = '<span class="text-amber-500 text-sm">10桁で入力</span>'; return; }
  try {
    const r = await api('GET', `/api/accounts/${acct}/name`);
    document.getElementById('txPayeeName').innerHTML = r.customer_name
      ? `<span class="text-emerald-600 font-medium">${r.customer_name}</span> <span class="text-[11px] text-gray-400">(${r.bank_name})</span>`
      : '<span class="text-red-500 text-sm">口座が見つかりません</span>';
  } catch { document.getElementById('txPayeeName').innerHTML = '<span class="text-red-500 text-sm">照会エラー</span>'; }
}

async function doTransfer(lane) {
  const payerBank = document.getElementById('txPayerBank').value;
  const payerAcct = document.getElementById('txPayerAcct').value;
  const payeeAcct = document.getElementById('txPayeeAcct').value.trim();
  const amount = parseInt(document.getElementById('txAmount').value);
  const purpose = 'P2P';
  if (!payeeAcct || payeeAcct.length !== 10) { toast('被仕向口座番号は10桁で入力してください', 'error'); return; }
  if (!amount || amount <= 0) { toast('金額を正しく入力してください', 'error'); return; }
  const payeeBankId = payeeAcct.slice(0, 3);
  const txid = 'TX-' + uuid();
  const body = {
    schema_version: '1.0', message_type: 'EVENT', name: 'PaymentInitiated',
    message_id: uuid(), idempotency_key: uuid(), occurred_at: new Date().toISOString(),
    txid, lane, amount: { value: amount, currency: 'JPY' },
    payer: { bank_id: payerBank, account_hash: payerAcct },
    payee: { bank_id: payeeBankId, account_hash: payeeAcct },
    purpose,
  };
  try {
    const r = await api('POST', '/api/transfers', body);
    document.getElementById('txResult').innerHTML = card('送金結果', `
      <dl class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-2 text-sm">
        <dt class="text-gray-400">取引ID</dt><dd class="mono">${r.txid||txid}</dd>
        <dt class="text-gray-400">状態</dt><dd>${badge(r.state||'RECEIVED')}</dd>
        <dt class="text-gray-400">結果</dt><dd>${r.result||'-'}</dd>
      </dl>`);
    toast('送金を受け付けました', 'success');
    if (lane === 'STANDARD' && r.state === 'RECEIVED') {
      setTimeout(() => checkAndAuthorize(r.txid || txid), 2000);
    }
  } catch(e) { toast('送金エラー: ' + e.message, 'error'); }
}

async function checkAndAuthorize(txid) {
  const r = await api('GET', `/api/transactions/${txid}`);
  if (r.state === 'H_RESERVED') {
    const auth = await api('POST', `/api/transfers/${txid}/authorize`, { txid, authorized: true, idempotency_key: uuid() });
    toast('Standard送金: 自動承認完了', 'success');
  }
}

async function loadJournals(bankId) {
  const r = await api('GET', `/bank/${bankId}/v1/teller/journals?limit=100`, null, tellerH(bankId));
  const el = document.getElementById('jnl-' + bankId);
  if (!el) return;
  const jnls = r.journals || [];
  if (jnls.length === 0) { el.innerHTML = '<p class="text-gray-400 text-sm py-4">仕訳データなし</p>'; return; }

  // Group by txid — entries sharing the same txid form one compound journal entry
  const keys = [], byKey = {};
  for (const j of jnls) {
    const k = j.txid || ('__' + j.journal_id);
    if (!byKey[k]) { byKey[k] = []; keys.push(k); }
    byKey[k].push(j);
  }

  // Render paired Dr/Cr ledger rows (Dr = amount < 0 / asset-side; Cr = amount >= 0 / liability-side)
  const rows = keys.flatMap(k => {
    const entries = byKey[k];
    const dr = entries.filter(j => j.amount < 0);
    const cr = entries.filter(j => j.amount >= 0);
    const n = Math.max(dr.length, cr.length, 1);
    const date = entries[0]?.value_date || '-';
    const txid = entries[0]?.txid ? entries[0].txid.slice(0, 16) : '-';
    const desc = entries[0]?.description || entries[0]?.tx_type || '-';
    return Array.from({ length: n }, (_, i) => {
      const d = dr[i], c = cr[i];
      return `<tr class="border-b border-gray-100 hover:bg-gray-50">
        ${i === 0 ? `<td class="py-2 pr-3 text-[11px] text-gray-400 align-top whitespace-nowrap" rowspan="${n}">${date}</td>` : ''}
        <td class="py-1.5 mono text-[11px] text-red-700 align-top pr-1">${d ? d.account_id : ''}</td>
        <td class="py-1.5 text-right text-[12px] font-medium text-red-600 align-top pr-3 whitespace-nowrap">${d ? fmtAmt(Math.abs(d.amount)) : ''}</td>
        <td class="py-1.5 text-center text-gray-300 align-top select-none">|</td>
        <td class="py-1.5 mono text-[11px] text-emerald-700 align-top pl-3 pr-1">${c ? c.account_id : ''}</td>
        <td class="py-1.5 text-right text-[12px] font-medium text-emerald-600 align-top pr-3 whitespace-nowrap">${c ? fmtAmt(c.amount) : ''}</td>
        ${i === 0 ? `<td class="py-2 text-[11px] text-gray-500 align-top pl-2" rowspan="${n}">${desc}</td>
        <td class="py-2 mono text-[11px] text-gray-300 align-top pl-2 whitespace-nowrap" rowspan="${n}">${txid}</td>` : ''}
      </tr>`;
    });
  }).join('');

  el.innerHTML = `<div class="overflow-x-auto">
    <table class="w-full text-sm border-collapse">
      <thead>
        <tr>
          <th class="pb-1 text-xs text-gray-400 font-medium text-left whitespace-nowrap" rowspan="2" style="min-width:72px">日付</th>
          <th class="pb-1 text-xs text-red-400 font-semibold text-center" colspan="2">借方 Dr</th>
          <th class="pb-1 text-gray-200 text-center" rowspan="2"></th>
          <th class="pb-1 text-xs text-emerald-500 font-semibold text-center" colspan="2">貸方 Cr</th>
          <th class="pb-1 text-xs text-gray-400 font-medium text-left" rowspan="2">摘要</th>
          <th class="pb-1 text-xs text-gray-400 font-medium text-left" rowspan="2">取引ID</th>
        </tr>
        <tr class="border-b border-gray-200">
          <th class="pb-2 text-xs text-gray-400 font-normal text-left">口座</th>
          <th class="pb-2 text-xs text-gray-400 font-normal text-right pr-3">金額</th>
          <th class="pb-2 text-xs text-gray-400 font-normal text-left pl-3">口座</th>
          <th class="pb-2 text-xs text-gray-400 font-normal text-right pr-3">金額</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

async function createHtlc() {
  const payerAcct = document.getElementById('htlcPayerAcct').value;
  const payeeAcct = document.getElementById('htlcPayeeAcct').value.trim();
  if (!payerAcct) { toast('支払口座を選択してください', 'error'); return; }
  if (!payeeAcct || payeeAcct.length !== 10) { toast('受取口座番号は10桁で入力してください', 'error'); return; }
  const payerBankId = payerAcct.slice(0, 3);
  const payeeBankId = payeeAcct.slice(0, 3);
  const htlcId = 'HTLC-' + uuid().slice(0,8);
  const body = {
    htlc_id: htlcId, hashlock: '', timelock: new Date(document.getElementById('htlcTimelock').value + 'Z').toISOString(),
    amount: { value: parseInt(document.getElementById('htlcAmt').value), currency: 'JPY' },
    payer_bank_id: payerBankId, payer_account_hash: payerAcct,
    payee_bank_id: payeeBankId, payee_account_hash: payeeAcct,
    idempotency_key: uuid(),
  };
  const r = await api('POST', '/api/htlc/create', body);
  if (r.error || r.reason_code) {
    toast('HTLC作成エラー: ' + (r.error || r.reason_code), 'error');
    return;
  }
  document.getElementById('htlcResult').innerHTML = card('HTLC作成結果', `
    <dl class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-2 text-sm">
      <dt class="text-gray-400">HTLC ID</dt><dd class="mono">${r.htlc_id}</dd>

  toast('HTLC作成完了', 'success');
}

  const payeeTotal = gtidLegs.filter(l=>l.role==='PAYEE').reduce((s,l)=>s+parseInt(l.amount||'0'),0);
  const ok = payerTotal > 0 && payerTotal === payeeTotal;

async function doGtid() {
  // Validation
  const payerLegs = gtidLegs.filter(l => l.role === 'PAYER');
  const payeeLegs = gtidLegs.filter(l => l.role === 'PAYEE');
  if (payerLegs.length === 0 || payeeLegs.length === 0) { toast('PAYERとPAYEEが各1つ以上必要です', 'error'); return; }
  for (const leg of gtidLegs) {
    if (!leg.account || leg.account.length !== 10) { toast('全レグの口座番号を10桁で入力してください', 'error'); return; }
    if (!parseInt(leg.amount) || parseInt(leg.amount) <= 0) { toast('全レグの金額を正しく入力してください', 'error'); return; }
  }
  const payerTotal = payerLegs.reduce((s,l) => s + parseInt(l.amount), 0);
  const payeeTotal = payeeLegs.reduce((s,l) => s + parseInt(l.amount), 0);
  if (payerTotal !== payeeTotal) { toast(`PAYER合計(${fmtAmt(payerTotal)})とPAYEE合計(${fmtAmt(payeeTotal)})が一致しません`, 'error'); return; }

  const gtid = 'GT-' + uuid().slice(0, 8);
  const legs = gtidLegs.map(leg => ({
    leg_id: `LEG-${leg.role[0]}-${uuid().slice(0,6)}`,
    role: leg.role,
    bank_id: leg.account.slice(0, 3),
    account_hash: leg.account,
    amount: { value: parseInt(leg.amount), currency: 'JPY' },
  }));
  const body = { gtid, legs, idempotency_key: uuid() };
  const r = await api('POST', '/api/gtid/register', body);
  document.getElementById('gtidResult').innerHTML = card('GTID結果', `
    <dl class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-2 text-sm">
      <dt class="text-gray-400">GTID</dt><dd class="mono">${r.gtid}</dd>
      <dt class="text-gray-400">状態</dt><dd>${badge(r.state)}</dd>
      <dt class="text-gray-400">レグ数</dt><dd>${legs.length}</dd>
    </dl>`);
  toast('GTID登録完了', 'success');
  // Reset legs
  gtidLegs = [
    { role: 'PAYER', account: '', amount: '30000' },
    { role: 'PAYEE', account: '', amount: '30000' },
  ];
  setTimeout(() => loadGtidList(), 2000);
}

// ========== sha256hex (Web Crypto API) ==========
async function sha256hex(text) {
  const buf = await globalThis.crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function refreshLiquidity() {
  await loadBanks();
  const today = new Date().toISOString().slice(0,10);
  let dnsPos = [];
  try { const r = await api('GET', `/api/dns/${today}/position`); dnsPos = r.positions || []; } catch(e) {}

  const gaugesEl = document.getElementById('liqGauges');
  if (!gaugesEl) return;
  gaugesEl.innerHTML = '';

  for (const bank of banks.slice(0, 8)) {
    let reserved = 0, total = 1;
    try {
      const [suspR, acctR] = await Promise.all([
        api('GET', `/bank/${bank.bank_id}/v1/teller/suspense`, null, {'X-Bank-Id': bank.bank_id, 'X-Teller-Id': 'TELLER-001'}),
        api('GET', `/bank/${bank.bank_id}/v1/teller/accounts`, null, {'X-Bank-Id': bank.bank_id, 'X-Teller-Id': 'TELLER-001'}),
      ]);
      const susps = suspR.suspense || suspR.suspense_accounts || suspR.accounts || [];
      reserved = susps.filter(s => s.status === 'RESERVED' || s.account_type === 'SUSPENSE').reduce((a, s) => a + (s.balance || 0), 0);
      const accts = acctR.accounts || [];
      total = accts.filter(a => a.account_type !== 'SUSPENSE').reduce((a, x) => a + (x.balance || 1), 1);
    } catch(e) {}
    const pct = Math.min(100, Math.round(reserved / total * 100));

    const div = document.createElement('div');
    div.className = 'bg-white rounded-lg border border-gray-200 p-3 fade-in';
    div.innerHTML = `<div class="text-xs text-gray-500 mb-1 truncate">${bank.bank_name || bank.bank_id}</div><div id="gauge-${bank.bank_id}" style="height:120px"></div><div class="text-center text-[11px] text-gray-400 mt-1">H利用: ${pct}%</div>`;
    gaugesEl.appendChild(div);

    const chart = echarts.init(div.querySelector(`#gauge-${bank.bank_id}`));
    chart.setOption({ series: [{ type: 'gauge', min: 0, max: 100, radius: '90%',
      axisLine: { lineStyle: { color: [[0.5,'#34d399'],[0.8,'#fbbf24'],[1,'#f87171']], width: 10 } },
      pointer: { length: '60%', width: 4 },
      detail: { formatter: '{value}%', fontSize: 12, offsetCenter: [0, '70%'] },
      data: [{ value: pct }],
      axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false },
    }] });
  }

async function setNetFilter(f) {
  netFilter = f;
  document.querySelectorAll('[id^="netf-"]').forEach(el => {
    const active = el.id === `netf-${f}`;
    el.className = `text-xs px-3 py-1 rounded-full border ${active ? 'border-brand-500 text-brand-600 bg-brand-50' : 'border-gray-200 text-gray-400 hover:border-gray-300'}`;
  });
  await loadNetworkData();
}

async function loadNetworkData() {
  await loadBanks();
  const txRes = await api('GET', '/api/transactions?limit=500');
  let txs = txRes.transactions || [];
  if (netFilter === 'SETTLED') txs = txs.filter(t => t.state === 'SETTLED');
  else if (netFilter === 'processing') txs = txs.filter(t => t.state !== 'SETTLED' && t.state !== 'FAILED_EXECUTION' && t.state !== 'CANCELLED');

  const edgeMap = {};
  const txCount = {};
  for (const tx of txs) {
    if (!tx.payer_bank_id || !tx.payee_bank_id) continue;
    const key = `${tx.payer_bank_id}->${tx.payee_bank_id}`;
    if (!edgeMap[key]) edgeMap[key] = { source: tx.payer_bank_id, target: tx.payee_bank_id, count: 0, total: 0 };
    edgeMap[key].count++;
    edgeMap[key].total += tx.amount?.value ?? 0;
    txCount[tx.payer_bank_id] = (txCount[tx.payer_bank_id] || 0) + 1;
    txCount[tx.payee_bank_id] = (txCount[tx.payee_bank_id] || 0) + 1;
  }

  const activeBankIds = new Set([...txs.map(t => t.payer_bank_id), ...txs.map(t => t.payee_bank_id)].filter(Boolean));
  const nodeList = banks.filter(b => activeBankIds.has(b.bank_id) || banks.length <= 5);

  const el = document.getElementById('netChartDiv');
  if (!el) return;
  if (netChart) { netChart.dispose(); netChart = null; }
  const PALETTE = ['#4f7cff','#22c55e','#f59e0b','#ef4444','#8b5cf6',
                   '#06b6d4','#ec4899','#10b981','#f97316','#6366f1'];
  netChart = echarts.init(el);
  netChart.setOption({
    tooltip: { formatter: p => p.dataType === 'node'
      ? `<b>${p.data.name}</b><br>取引: ${txCount[p.data.id]||0}件`
      : `${bankName(p.data.source)} → ${bankName(p.data.target)}<br>${p.data.count}件 / ${fmtAmt(p.data.total)}` },
    series: [{
      type: 'graph', layout: 'force', roam: true, animation: true,
      emphasis: { focus: 'adjacency' },
      edgeSymbol: ['none', 'arrow'],
      edgeSymbolSize: [0, 8],
      label: { show: true, fontSize: 11 },
      lineStyle: { curveness: 0.2, opacity: 0.6 },
      nodes: nodeList.map(b => ({
        id: b.bank_id, name: b.bank_name || b.bank_id,
        symbolSize: Math.max(22, Math.min(55, 20 + Math.sqrt(txCount[b.bank_id] || 0) * 2)),
        itemStyle: { color: PALETTE[parseInt(b.bank_id) % PALETTE.length] },
      })),
      edges: Object.values(edgeMap).map(e => ({
        source: e.source, target: e.target, count: e.count, total: e.total,
        lineStyle: { width: Math.max(1, Math.log2(e.count + 1)) },
      })),
      force: { repulsion: 3000, gravity: 0.15, edgeLength: [80, 250] },
    }],
  });
  netChart.on('click', params => {
    if (params.dataType === 'node') showBankTxList(params.data.id, txs);
  });
}

function simLog(msg) {
  const el = document.getElementById('simLog');
  if (!el) return;
  const time = new Date().toLocaleTimeString('ja-JP');
  const div = document.createElement('div');
  div.textContent = `[${time}] ${msg}`;
  el.appendChild(div);
  while (el.children.length > 50) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

function updateSimStats() {
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('statSent', simStats.sent);
  set('statOk',   simStats.ok);
  set('statErr',  simStats.err);
  set('statHtlc', simStats.htlcClaim);
}

function pickLane() {
  const lanes = ['EXPRESS','STANDARD','BULK','HIGH_VALUE','HTLC','GTID'];
  const weights = lanes.map(l => { const el = document.getElementById(`ls-${l}`); return el ? parseInt(el.value) : 0; });
  const total = weights.reduce((a,b) => a+b, 0);
  if (total === 0) return 'EXPRESS';
  let r = Math.random() * total;
  for (let i = 0; i < lanes.length; i++) { r -= weights[i]; if (r <= 0) return lanes[i]; }
  return 'EXPRESS';
}

async function sendOneTx() {
  if (!simAccounts.length) return;
  const minAmt = parseInt(document.getElementById('simMinAmt')?.value || '1000');
  const maxAmt = parseInt(document.getElementById('simMaxAmt')?.value || '100000');
  const payer = simAccounts[Math.floor(Math.random() * simAccounts.length)];
  let payee;
  let tries = 0;
  do { payee = simAccounts[Math.floor(Math.random() * simAccounts.length)]; tries++; }
  while ((payee.accountId === payer.accountId || (payee.bankId === payer.bankId && Math.random() > 0.1)) && tries < 20);

  const lane = pickLane();
  const amount = Math.floor(Math.random() * (maxAmt - minAmt + 1)) + minAmt;

  try {
    if (lane === 'HTLC') {
      const preimageBytes = new Uint8Array(32);
      crypto.getRandomValues(preimageBytes);
      const preimage = Array.from(preimageBytes).map(b => b.toString(16).padStart(2,'0')).join('');
      const hashlock = await sha256hex(preimage);
      const r = await api('POST', '/api/htlc/create', {
        htlc_id: 'HTLC-' + uuid(), hashlock,
        timelock: new Date(Date.now() + 600_000).toISOString(),
        amount: { value: amount, currency: 'JPY' },
        payer_bank_id: payer.bankId, payer_account_hash: payer.accountId,
        payee_bank_id: payee.bankId, payee_account_hash: payee.accountId,
        idempotency_key: uuid(),
      });
      simLog(`HTLC ${r.htlc_id ?? '?'} preimage=${preimage} → created, claiming in 800ms...`);
      simStats.ok++;
      setTimeout(async () => {
        try {
          await api('POST', `/api/htlc/${r.htlc_id}/claim`, { htlc_id: r.htlc_id, preimage, idempotency_key: uuid() });
          simStats.htlcClaim++; updateSimStats();
          simLog(`HTLC ${r.htlc_id} → claimed`);
        } catch(e) { simLog(`HTLC ${r.htlc_id} claim error: ${e.message}`); }
      }, 800);
    } else if (lane === 'GTID') {
      const gtid = 'GT-' + uuid();
      // leg_id は GtidLegs の PRIMARY KEY (グローバル一意) のため uuid で生成
      const leg1id = 'L-' + uuid().slice(0, 8);
      const leg2id = 'L-' + uuid().slice(0, 8);
      await api('POST', '/api/gtid/register', {
        gtid, legs: [
          { leg_id: leg1id, role: 'PAYER', bank_id: payer.bankId, account_hash: payer.accountId, amount: { value: amount, currency: 'JPY' } },
          { leg_id: leg2id, role: 'PAYEE', bank_id: payee.bankId, account_hash: payee.accountId, amount: { value: amount, currency: 'JPY' } },
        ],
        expires_at: new Date(Date.now() + 300_000).toISOString(), idempotency_key: uuid(),
      });
      simLog(`GTID ${gtid} → registered`);
      simStats.ok++;
    } else {
      const txid = 'TX-' + uuid();
      await api('POST', '/api/transfers', {
        schema_version: '1.0', message_type: 'EVENT', name: 'PaymentInitiated',
        message_id: uuid(), idempotency_key: uuid(), occurred_at: new Date().toISOString(),
        txid, lane, amount: { value: amount, currency: 'JPY' },
        payer: { bank_id: payer.bankId, account_hash: payer.accountId },
        payee: { bank_id: payee.bankId, account_hash: payee.accountId },
        purpose: ['P2P','MERCHANT','BILL','SALARY'][Math.floor(Math.random()*4)],
      });
      simLog(`${txid.slice(0,16)}... ${lane} 銀行${payer.bankId}→銀行${payee.bankId} ¥${amount.toLocaleString()} → RECEIVED`);
      simStats.ok++;
    }
  } catch(e) {
    simStats.err++;
    simLog(`ERROR: ${e.message}`);
  }
  simStats.sent++;
  updateSimStats();

  if (simMaxTx > 0 && simStats.sent >= simMaxTx) simStop();
}

function simStart() {
  if (simTimer) return;
  if (!simAccounts.length) { toast('先にセットアップを実行してください', 'error'); return; }
  simStats = { sent: 0, ok: 0, err: 0, htlcClaim: 0 };
  simMaxTx = 0;
  updateSimStats();
  const tps = parseInt(document.getElementById('simTps')?.value || '5');
  const interval = Math.floor(1000 / tps);
  simTimer = setInterval(sendOneTx, interval);
  simStartTime = Date.now();
  simElapsedTimer = setInterval(() => {
    const el = document.getElementById('simElapsed');
    if (!el) return;
    const s = Math.floor((Date.now() - simStartTime) / 1000);
    el.textContent = `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
  const startBtn = document.getElementById('simStartBtn');
  const stopBtn  = document.getElementById('simStopBtn');
  const ind      = document.getElementById('simRunIndicator');
  if (startBtn) startBtn.style.display = 'none';
  if (stopBtn)  stopBtn.style.display  = '';
  if (ind)      ind.style.display      = '';
}

function simStop() {
  if (simTimer) { clearInterval(simTimer); simTimer = null; }
  if (simElapsedTimer) { clearInterval(simElapsedTimer); simElapsedTimer = null; }
  const startBtn = document.getElementById('simStartBtn');
  const stopBtn  = document.getElementById('simStopBtn');
  const ind      = document.getElementById('simRunIndicator');
  if (startBtn) startBtn.style.display = '';
  if (stopBtn)  stopBtn.style.display  = 'none';
  if (ind)      ind.style.display      = 'none';
}

function applyScenario(s) {
  // シナリオをシミュレーションタブに反映してStart
  const lanesEl = document.getElementById('laneSliders');
  if (lanesEl) {
    ['EXPRESS','STANDARD','BULK','HIGH_VALUE','HTLC','GTID'].forEach(l => {
      const el = document.getElementById(`ls-${l}`);
      const lp = document.getElementById(`lp-${l}`);
      const v = s.lanes[l] || 0;

  const tpsEl = document.getElementById('simTps');
  const tpsVal = document.getElementById('tpsVal');
  if (tpsEl) tpsEl.value = s.tps;
  if (tpsVal) tpsVal.textContent = s.tps;
  simMaxTx = s.max;
  // シミュレーションタブへ切り替え
  document.getElementById('simSetupTab').style.display = 'none';
  document.getElementById('simRunTab').style.display   = '';

}

async function doSimSetup() {
  const btn  = document.getElementById('simSetupBtn');
  if (btn) btn.disabled = true;
  const prog = document.getElementById('simSetupProgress');
  const bar  = document.getElementById('simProgressBar');
  const txt  = document.getElementById('simProgressText');
  const log  = document.getElementById('simSetupLog');
  if (prog) prog.style.display = '';
  if (bar)  { bar.max = 100; bar.value = 0; }
  simAccounts = [];

  function addLog(msg) {
    if (!log) return;
    const d = document.createElement('div');
    d.textContent = msg;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }
  function setProgress(pct, msg) {
    if (bar) bar.value = pct;
    if (txt) txt.textContent = `${Math.round(pct)}% — ${msg}`;
  }

  const BANK_COUNT = 18;
  const ACCOUNTS   = 200;
  // ステップ数: seed(1) + 銀行18行(18) + 口座取得(1) = 20
  const TOTAL_STEPS = 1 + BANK_COUNT + 1;

  // Step 1: 全データリセット（2%）
  addLog('[1/20] 全データリセット中...');
  setProgress(2, 'リセット中...');
  try {
    const resp = await fetch(BASE + '/internal/seed', { method: 'POST', headers: { 'Content-Type': 'application/json', ...cronH() } });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    addLog('  [OK] リセット完了');
  } catch(e) {
    addLog('  [FAIL] リセット失敗: ' + e.message);
    if (btn) btn.disabled = false;
    return;
  }

  // Step 2–19: 銀行 003〜020 を1行ずつ作成（5%〜90%）
  let totalAccounts = 0;
  const failedBanks = [];
  for (let i = 0; i < BANK_COUNT; i++) {
    const pct = 5 + Math.round(i / BANK_COUNT * 80);
    const bankCode = String(3 + i).padStart(3, '0');
    addLog(`[${i+2}/${TOTAL_STEPS}] 銀行 ${bankCode} 初期化中...`);
    setProgress(pct, `銀行 ${bankCode} 口座 ${ACCOUNTS} 件作成中...`);
    try {
      const resp = await fetch(BASE + '/internal/sim/setup-bank', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...cronH() },
        body: JSON.stringify({ bank_index: i, accounts_per_bank: ACCOUNTS, personal_ratio: 0.9 }),
      });
      const r = await resp.json().catch(() => ({}));
      if (!resp.ok || r.error) throw new Error(r.message || r.error || `HTTP ${resp.status}`);
      totalAccounts += r.accounts_created ?? ACCOUNTS;
      addLog(`  [OK] ${r.bank_name} (${r.bank_id}) — 口座 ${r.accounts_created} 件 (${r.elapsed_ms}ms)`);
    } catch(e) {
      addLog(`  [FAIL] 銀行 ${bankCode} エラー: ` + e.message);
      failedBanks.push(bankCode);
      // 失敗しても続行
    }
  }

  if (failedBanks.length > 0) {
    addLog(`\n[WARN] ${failedBanks.length}行の初期化に失敗しました: ${failedBanks.join(', ')}`);
    addLog('これらの銀行の口座は使用できません');
  }

  // Step 20: 口座一覧を取得してシミュレーターに登録（92%→100%）
  addLog(`[${TOTAL_STEPS}/${TOTAL_STEPS}] 口座一覧を取得中...`);
  setProgress(92, '口座一覧取得中...');
  try {
    const allBanks = await api('GET', '/api/banks');
    const bankList = allBanks.banks || [];
    // 全銀行の口座取得を並列実行（no_balance=1 で残高計算をスキップ）
    const results = await Promise.all(bankList.map(bank =>
      api('GET', `/bank/${bank.bank_id}/v1/teller/accounts?no_balance=1`,
        null, { 'X-Bank-Id': bank.bank_id, 'X-Teller-Id': 'TELLER-001' })
        .then(accts => ({ bank, accts }))
        .catch(() => ({ bank, accts: { accounts: [] } }))
    ));
    for (const { bank, accts } of results) {
      for (const a of (accts.accounts || [])) {
        if (a.account_type === 'SAVINGS' || a.account_type === 'CURRENT') {
          simAccounts.push({ bankId: bank.bank_id, accountId: a.account_id, customerId: a.customer_id, name: a.customer_name });
        }
      }
    }
    addLog(`  [OK] ${simAccounts.length} 口座を送金エンジンに登録`);
  } catch(e) { addLog('  [FAIL] 口座一覧取得: ' + e.message); }

  setProgress(100, '初期化完了');
  const summaryEl = document.getElementById('simSetupSummary');
  if (summaryEl) summaryEl.innerHTML = `
    <div class="bg-emerald-50 border border-emerald-200 rounded p-4 text-sm">
      <div class="font-medium text-emerald-700">初期化完了</div>
      <div class="text-emerald-600 mt-1">銀行: ${BANK_COUNT}行 / 口座: ${totalAccounts}件 / 送金エンジン登録: ${simAccounts.length}件</div>
      ${failedBanks.length > 0 ? `<div class="text-amber-600 mt-1"><i class="fa-solid fa-triangle-exclamation"></i> ${failedBanks.length}行の初期化に失敗</div>` : ''}
    </div>`;
  if (btn) btn.disabled = false;
  toast('大規模初期化完了', 'success');
  await loadBanks();
}

// ========== 既存口座でシミュレーション開始 ==========
async function doSimSetupFromExisting() {
  const btn = document.getElementById('simSetupFromExistingBtn');
  if (btn) btn.disabled = true;
  const prog = document.getElementById('simSetupProgress');
  const bar = document.getElementById('simProgressBar');
  const txt = document.getElementById('simProgressText');
  const log = document.getElementById('simSetupLog');
  if (prog) prog.style.display = '';
  if (bar) { bar.max = 100; bar.value = 0; }
  simAccounts = [];

  function addLog(msg) {
    if (!log) return;
    const d = document.createElement('div');
    d.textContent = msg;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }
  function setProgress(pct, msg) {
    if (bar) bar.value = pct;
    if (txt) txt.textContent = `${Math.round(pct)}% — ${msg}`;
  }

  setProgress(10, '既存口座を取得中...');
  addLog('[1/2] 既存口座を取得中...');
  try {
    const allBanks = await api('GET', '/api/banks');
    if (!allBanks.banks || allBanks.banks.length === 0) {
      addLog('  [FAIL] 銀行が登録されていません');
      if (btn) btn.disabled = false;
      return;
    }

    let bankCount = 0;
    let acctCount = 0;
    // 全銀行の口座取得を並列実行（no_balance=1 で残高計算をスキップ）
    const fetchResults = await Promise.all(allBanks.banks.map(bank =>
      api('GET', `/bank/${bank.bank_id}/v1/teller/accounts?no_balance=1`,
        null, { 'X-Bank-Id': bank.bank_id, 'X-Teller-Id': 'TELLER-001' })
        .then(accts => ({ bank, accts }))
        .catch(e => {
          console.warn(`[sim] 銀行 ${bank.bank_id} の口座取得失敗:`, e.message);
          return { bank, accts: { accounts: [] } };
        })
    ));
    for (const { bank, accts } of fetchResults) {
      const savingsAccounts = (accts.accounts || []).filter(a =>
        a.account_type === 'SAVINGS' || a.account_type === 'CURRENT'
      );
      for (const a of savingsAccounts) {
        simAccounts.push({ bankId: bank.bank_id, accountId: a.account_id, customerId: a.customer_id, name: a.customer_name });
        acctCount++;
      }
      if (savingsAccounts.length > 0) {
        bankCount++;
      }
    }

    if (simAccounts.length === 0) {
      addLog('  [FAIL] 取得できた口座がありません');
      if (btn) btn.disabled = false;
      return;
    }

    addLog(`  [OK] ${bankCount}行 から ${acctCount}件の口座を取得`);
    setProgress(50, '口座を検証中...');

    // 最小口座数チェック
    if (simAccounts.length < 2) {
      addLog('  [WARN] 警告: 送受金ペアを作成するには最低2口座が必要です');
    }

    setProgress(100, '準備完了');
    const summaryEl = document.getElementById('simSetupSummary');
    if (summaryEl) summaryEl.innerHTML = `
      <div class="bg-blue-50 border border-blue-200 rounded p-4 text-sm">
        <div class="font-medium text-blue-700">既存口座で準備完了</div>
        <div class="text-blue-600 mt-1">銀行: ${bankCount}行 / 口座: ${acctCount}件</div>
      </div>`;
    if (btn) btn.disabled = false;
    toast(`既存口座でシミュレーション準備完了 (${acctCount}件)`, 'success');
  } catch (e) {
    addLog('  [FAIL] エラー: ' + e.message);
    if (btn) btn.disabled = false;
    toast('既存口座取得に失敗しました', 'error');
  }
}

// ========== TX Timeline Modal ==========
async function showTxTimeline(txid) {
  const modal = document.getElementById('txModal');
  const modalId = document.getElementById('txModalId');
  const modalMeta = document.getElementById('txModalMeta');
  const timeline = document.getElementById('txModalTimeline');
  if (!modal) return;
  modalId.textContent = txid;
  modalMeta.innerHTML = '<div class="text-gray-300 text-xs col-span-4">読み込み中...</div>';
  timeline.innerHTML = '<div class="text-gray-400 text-sm py-4 text-center">イベントを取得中...</div>';
  modal.classList.remove('hidden');

  try {
    const [txRes, evRes] = await Promise.all([
      api('GET', `/api/transactions/${txid}`),
      api('GET', `/api/transactions/${txid}/events`),
    ]);
    const tx = txRes.transaction || txRes || {};
    const events = evRes.events || [];
    const isBad = tx.state === 'SUSPENDED' || tx.state === 'CANCELLED' || tx.state === 'FAIL_DEBIT' || tx.state === 'FAIL_CREDIT';
    modalMeta.innerHTML = `
      <div><div class="text-[10px] text-gray-400 uppercase tracking-wider">状態</div><div class="mt-1">${badge(tx.state || '-')}</div></div>
      <div><div class="text-[10px] text-gray-400 uppercase tracking-wider">レーン</div><div class="mt-1 text-sm font-medium">${tx.lane || '-'}</div></div>
      <div><div class="text-[10px] text-gray-400 uppercase tracking-wider">金額</div><div class="mt-1 text-sm font-medium">${tx.amount_value ? fmtAmt(tx.amount_value) : '-'}</div></div>
      <div><div class="text-[10px] text-gray-400 uppercase tracking-wider">作成日時</div><div class="mt-1 text-[11px] text-gray-600">${fmtDate(tx.created_at)}</div></div>
    `;
    if (isBad && tx.reason_code) {
      modalMeta.insertAdjacentHTML('beforeend', `
        <div class="col-span-4 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
          <div class="text-[11px] text-red-600 font-semibold uppercase tracking-wider mb-1">停止・失敗理由</div>
          <div class="text-sm text-red-700 font-medium">${tx.reason_code}</div>
        </div>`);
    }
    if (!events.length) {
      timeline.innerHTML = '<div class="text-gray-400 text-sm py-8 text-center">イベントログがありません（非同期処理待ちか、古い取引の可能性があります）</div>';
    } else {
      const statusIcon = s => s === 'OK' ? '<i class="fa-solid fa-check"></i>' : s === 'FAILED' ? '<i class="fa-solid fa-xmark"></i>' : '<i class="fa-solid fa-circle text-[8px]"></i>';
      const statusCls  = s => s === 'OK' ? 'text-emerald-600 bg-emerald-50 border-emerald-200' : s === 'FAILED' ? 'text-red-600 bg-red-50 border-red-200' : 'text-amber-600 bg-amber-50 border-amber-200';
      timeline.innerHTML = events.map((ev, i) => `
        <div class="flex gap-3 fade-in" style="animation-delay:${i*30}ms">
          <div class="flex flex-col items-center flex-shrink-0">
            <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center text-sm font-bold ${statusCls(ev.status)}">${statusIcon(ev.status)}</div>
            ${i < events.length-1 ? '<div class="w-0.5 flex-1 bg-gray-200 mt-1"></div>' : ''}
          </div>
          <div class="flex-1 pb-4">
            <div class="flex items-start justify-between gap-2">
              <div>
                <span class="text-sm font-medium text-gray-800">${ev.action || ev.event_type || '-'}</span>
                ${ev.actor ? `<span class="ml-2 text-[10px] text-gray-400 bg-gray-100 rounded px-1.5 py-0.5">${ev.actor}</span>` : ''}
                ${ev.source === 'FINALITY' ? `<span class="ml-1 text-[9px] text-blue-500 bg-blue-50 border border-blue-100 rounded px-1 py-0.5">状態遷移</span>` : ''}
              </div>
              <div class="text-right flex-shrink-0">
                <div class="text-[11px] text-gray-400">${fmtDate(ev.created_at)}</div>
                ${ev.duration_ms !== null && ev.duration_ms !== undefined ? `<div class="text-[10px] text-gray-300">${ev.duration_ms}ms</div>` : ''}
              </div>
            </div>
            ${ev.state_to ? `<div class="mt-0.5 flex items-center gap-1 text-[11px]">
              ${ev.state_from ? `<span class="text-gray-400 font-mono">${ev.state_from}</span><span class="text-gray-300 mx-0.5">→</span>` : ''}
              <span class="font-semibold font-mono text-brand-600">${ev.state_to}</span>
            </div>` : ''}
            ${ev.reason_code ? `<div class="mt-1 inline-flex items-center gap-1 bg-red-50 border border-red-200 rounded px-2 py-0.5">
              <span class="text-[10px] text-red-500 font-semibold uppercase">${ev.reason_code}</span>
            </div>` : ''}
            ${ev.detail ? `<div class="mt-1 text-[11px] text-gray-500 font-mono break-all">${ev.detail}</div>` : ''}
          </div>
        </div>
      `).join('');
    }
  } catch(e) {
    timeline.innerHTML = `<div class="text-red-500 text-sm py-4">取得エラー: ${e.message}</div>`;
  }
}

async function doAcctVerify() {
  const acct = document.getElementById('avAcct')?.value.trim();
  const name = document.getElementById('avName')?.value.trim();
  if (!acct || acct.length !== 10) { toast('口座番号を10桁で入力してください', 'error'); return; }

    document.getElementById('avResult').innerHTML = card('照会結果', `

        <div><label class="block text-xs text-gray-400 mb-1">送金人名（FATF R.16）</label><input type="text" id="cbPayerName" placeholder="Full name in English" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm"></div>
        <div><label class="block text-xs text-gray-400 mb-1">送金人住所（FATF R.16）</label><input type="text" id="cbPayerAddr" placeholder="例: 1-1 Marunouchi, Chiyoda-ku, Tokyo" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm"></div>
      </div>
      <div class="space-y-3">
        <h4 class="text-xs font-medium text-gray-500 uppercase tracking-wider"><i class="fa-solid fa-arrow-down-to-bracket mr-1"></i> 被仕向（受取人）</h4>
        <div><label class="block text-xs text-gray-400 mb-1">国外銀行BIC (SWIFT)</label><input type="text" id="cbPayeeBic" placeholder="例: CHASUS33" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono"></div>
        <div><label class="block text-xs text-gray-400 mb-1">受取口座(IBAN等)</label><input type="text" id="cbPayeeAcct" placeholder="例: US123456789" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono"></div>
        <div><label class="block text-xs text-gray-400 mb-1">受取人名（FATF R.16）</label><input type="text" id="cbPayeeName" placeholder="Full name in English" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm"></div>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
      <div><label class="block text-xs text-gray-400 mb-1">金額</label><input type="number" id="cbAmt" value="100000" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm"></div>
      <div><label class="block text-xs text-gray-400 mb-1">通貨</label><select id="cbCur" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm"><option value="JPY">JPY</option><option value="USD">USD</option><option value="EUR">EUR</option></select></div>
      <div><label class="block text-xs text-gray-400 mb-1">目的</label><select id="cbPurpose" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm"><option value="TRADE">貿易決済</option><option value="REMITTANCE">送金</option><option value="INVESTMENT">投資</option></select></div>
    </div>
    <button class="mt-6 bg-brand-500 hover:bg-brand-600 text-white px-5 py-2 rounded-md text-sm transition-colors" onclick="doCrossBorderSend()"><i class="fa-solid fa-earth-americas mr-1"></i> クロスボーダー送金実行</button>`;
    loadAccounts('cbPayerBank', 'cbPayerAcct');
    document.getElementById('cbPayerBank').onchange = () => loadAccounts('cbPayerBank', 'cbPayerAcct');
  } else {
    el.innerHTML = '<div id="cbList" class="text-sm text-gray-400">読込中...</div>';
    loadCbList();
  }
}
async function doCrossBorderSend() {
  const payerBankId = document.getElementById('cbPayerBank').value;
  const payerAcct = document.getElementById('cbPayerAcct')?.value;
  const payeeBic = document.getElementById('cbPayeeBic')?.value.trim().toUpperCase();
  const payeeAcct = document.getElementById('cbPayeeAcct')?.value.trim();
  const payerAddr = document.getElementById('cbPayerAddr')?.value.trim();
  if (!payerAcct || !payeeBic || !payeeAcct || !payerAddr) { toast('全項目を入力してください（送金人住所含む）', 'error'); return; }
  // BICの5〜6文字目を相手国コードとして使用 (例: CHASUS33 → US)
  const beneficiaryCountry = payeeBic.length >= 6 ? payeeBic.substring(4, 6) : 'US';
  const payerBank = banks.find(b => b.bank_id === payerBankId) || { bank_name: payerBankId, bank_id: payerBankId };
  const foreignAmt = parseInt(document.getElementById('cbAmt').value);
  const foreignCur = document.getElementById('cbCur').value;
  try {
    const r = await api('POST', '/api/cross-border/send', {
      cb_txid: 'CB-' + uuid(),
      payer_bank_id: payerBankId,
      payer_account_id: payerAcct,
      foreign_fps_id: payeeBic,
      foreign_bank_bic: payeeBic,
      foreign_account_id: payeeAcct,
      foreign_currency: foreignCur,
      foreign_amount: foreignAmt,
      idempotency_key: uuid(),
      fatf_data: {
        originator: {
          name: document.getElementById('cbPayerName')?.value || 'N/A',
          account_id: payerAcct,
          address: payerAddr,
        },
        beneficiary: {
          name: document.getElementById('cbPayeeName')?.value || 'N/A',
          account_id: payeeAcct,
        },
        ordering_institution: {
          bank_id: payerBankId,
          bank_name: payerBank.bank_name,
          country: 'JP',
        },
        beneficiary_institution: {
          bank_id: payeeBic,
          bank_name: payeeBic,
          country: beneficiaryCountry,
        },
        is_cross_border: true,
        fatf16_applicable: true,
      },
    });
    document.getElementById('cbResult').innerHTML = card('クロスボーダー送金結果', `
      <dl class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-2 text-sm">
        <dt class="text-gray-400">CB取引ID</dt><dd class="mono">${r.cb_txid||'-'}</dd>
        <dt class="text-gray-400">国内取引ID</dt><dd class="mono">${r.domestic_txid||'-'}</dd>
        <dt class="text-gray-400">状態</dt><dd>${badge(r.status||'-')}</dd>
      </dl>`);
    toast('クロスボーダー送金受付完了', 'success');
  } catch(e) { toast('送金エラー: ' + e.message, 'error'); }
}
async function loadCbList() {
  const el = document.getElementById('cbList');
  if (!el) return;
  const txRes = await api('GET', '/api/transactions?limit=100');
  const cbs = (txRes.transactions||[]).filter(t => t.lane === 'HIGH_VALUE' || t.is_cross_border);
  if (!cbs.length) { el.innerHTML = '<p class="text-gray-400 py-4">クロスボーダー取引はありません</p>'; return; }
  el.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-gray-200 text-left">
    <th class="pb-2 text-xs text-gray-400 font-medium">取引ID</th>
    <th class="pb-2 text-xs text-gray-400 font-medium">レーン</th>
    <th class="pb-2 text-xs text-gray-400 font-medium text-right">金額</th>
    <th class="pb-2 text-xs text-gray-400 font-medium">状態</th>
    <th class="pb-2 text-xs text-gray-400 font-medium">日時</th>
  </tr></thead><tbody class="divide-y divide-gray-100">${cbs.map(t => `<tr class="hover:bg-gray-50 cursor-pointer" onclick="showTxTimeline('${t.txid}')">
    <td class="py-2 mono text-[11px]">${t.txid}</td>
    <td class="py-2 text-xs">${t.lane}</td>
    <td class="py-2 text-right">${fmtAmt(t.amount_value)}</td>
    <td class="py-2">${badge(t.state)}</td>
    <td class="py-2 text-[11px] text-gray-400">${fmtDate(t.created_at)}</td>
  </tr>`).join('')}</tbody></table></div>`;
}

// ========== EDI / Rich Data ==========
async function renderEdi() {
  document.getElementById('app').innerHTML = card('EDI/リッチデータ', `
    ${subnav('ediNav', [{key:'register',label:'EDI登録'},{key:'search',label:'検索'},{key:'richdata',label:'リッチデータ'}])}
    <div id="ediTab"></div>
  `) + '<div id="ediResult"></div>';
  bindSubnav('ediNav', renderEdiTab);
  renderEdiTab('register');
}
function renderEdiTab(tab) {
  const el = document.getElementById('ediTab');
  if (tab === 'register') {
    el.innerHTML = `<div class="max-w-lg space-y-3">
      <div><label class="block text-xs text-gray-400 mb-1">取引ID</label>
        <input type="text" id="ediTxid" placeholder="TX-..." class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:ring-1 focus:ring-brand-500 focus:border-brand-500"></div>
      <div><label class="block text-xs text-gray-400 mb-1">請求書番号</label>
        <input type="text" id="ediInvoice" placeholder="INV-2026-001" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500"></div>
      <div><label class="block text-xs text-gray-400 mb-1">摘要</label>
        <input type="text" id="ediDesc" placeholder="商品代金" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500"></div>
      <button class="bg-brand-500 hover:bg-brand-600 text-white px-5 py-2 rounded-md text-sm transition-colors" onclick="doEdiRegister()"><i class="fa-solid fa-file-invoice mr-1"></i> EDI登録</button>
    </div>`;
  } else if (tab === 'search') {
    el.innerHTML = `<div class="max-w-lg space-y-3">
      <div><label class="block text-xs text-gray-400 mb-1">取引IDで検索</label>
        <div class="flex gap-2">
          <input type="text" id="ediSearchTxid" placeholder="TX-..." class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:ring-1 focus:ring-brand-500 focus:border-brand-500">
          <button class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-md text-sm transition-colors" onclick="doEdiSearch()"><i class="fa-solid fa-search"></i></button>
        </div>
      </div>
      <div><label class="block text-xs text-gray-400 mb-1">EDI参照コードで検索</label>
        <div class="flex gap-2">
          <input type="text" id="ediSearchRef" placeholder="EDI-..." class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:ring-1 focus:ring-brand-500 focus:border-brand-500">
          <button class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-md text-sm transition-colors" onclick="doEdiSearchByRef()"><i class="fa-solid fa-search"></i></button>
        </div>
      </div>
    </div>`;
  } else {
    el.innerHTML = `<div class="max-w-lg space-y-3">
      <div><label class="block text-xs text-gray-400 mb-1">取引IDで検索</label>
        <div class="flex gap-2">
          <input type="text" id="rdSearchTxid" placeholder="TX-..." class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus:ring-1 focus:ring-brand-500 focus:border-brand-500">
          <button class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-md text-sm transition-colors" onclick="doRdSearch()"><i class="fa-solid fa-search"></i></button>
        </div>
      </div>
    </div>`;
  }
}
async function doEdiRegister() {
  const txid = document.getElementById('ediTxid')?.value.trim();
  const invoice = document.getElementById('ediInvoice')?.value.trim();
  if (!txid) { toast('取引IDを入力してください', 'error'); return; }
  try {
    const r = await api('POST', '/api/edi/register', { txid, invoice_number: invoice, description: document.getElementById('ediDesc')?.value, idempotency_key: uuid() });
    document.getElementById('ediResult').innerHTML = card('EDI登録結果', `<dl class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-2 text-sm">
      <dt class="text-gray-400">EDI参照</dt><dd class="mono">${r.edi_ref||'-'}</dd>
      <dt class="text-gray-400">請求書番号</dt><dd>${invoice||'-'}</dd>
    </dl>`);
    toast('EDI登録完了', 'success');
  } catch(e) { toast('EDI登録エラー: ' + e.message, 'error'); }
}
async function doEdiSearch() {
  const txid = document.getElementById('ediSearchTxid')?.value.trim();
  if (!txid) return;
  try {
    const r = await api('GET', `/api/edi/tx/${txid}`);
    document.getElementById('ediResult').innerHTML = card('EDI検索結果', `<pre class="text-xs bg-gray-50 p-3 rounded overflow-x-auto">${JSON.stringify(r, null, 2)}</pre>`);
  } catch(e) { toast('検索エラー: ' + e.message, 'error'); }
}
async function doEdiSearchByRef() {
  const ref = document.getElementById('ediSearchRef')?.value.trim();
  if (!ref) return;
  try {
    const r = await api('GET', `/api/edi/${ref}`);
    document.getElementById('ediResult').innerHTML = card('EDI検索結果', `<pre class="text-xs bg-gray-50 p-3 rounded overflow-x-auto">${JSON.stringify(r, null, 2)}</pre>`);
  } catch(e) { toast('検索エラー: ' + e.message, 'error'); }
}
async function doRdSearch() {
  const txid = document.getElementById('rdSearchTxid')?.value.trim();
  if (!txid) return;
  try {
    const r = await api('GET', `/api/richdata/tx/${txid}`);
    document.getElementById('ediResult').innerHTML = card('リッチデータ検索結果', `<pre class="text-xs bg-gray-50 p-3 rounded overflow-x-auto">${JSON.stringify(r, null, 2)}</pre>`);
  } catch(e) { toast('検索エラー: ' + e.message, 'error'); }
}

// ========== Sidebar toggle (mobile) ==========
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar();
}

// ========== Init ==========
document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => { closeSidebar(); renderPage(b.dataset.page); });
renderPage('overview');
</script>
