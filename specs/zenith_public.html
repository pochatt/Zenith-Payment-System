  <style>
    :root {
      --bg-body: #f4f7fb;
      --bg-card: #ffffff;
      --bg-reader: #ffffff;
      --brand: #0f2d5c;
      --brand-light: #eef2f9;
      --text-main: #1a202c;
      --text-muted: #64748b;
      --line: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, .05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, .10), 0 2px 4px -1px rgba(0, 0, 0, .06);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
    }

    img,
    svg {
      max-width: 100%;
      height: auto;
    }

    body {
      margin: 0;
      font-family: 'IBM Plex Sans', 'Zen Kaku Gothic New', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(1200px 700px at 10% -10%, #e7f2ff 0%, rgba(231, 242, 255, 0) 60%),
        radial-gradient(1000px 600px at 100% 0%, #e7fff3 0%, rgba(231, 255, 243, 0) 55%),
        var(--bg-body);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      min-height: 64px;
      padding: 8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-inner {
      width: 100%;
      max-width: 1200px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }

    .brand {
      justify-self: start;
      font-weight: 700;
      font-size: 18px;
      color: var(--brand);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .brand-badge {
      width: 18px;
      height: 18px;
      border: 2px solid var(--brand);
      border-radius: 999px;
      display: inline-block;
      box-shadow: inset 0 0 0 4px rgba(15, 45, 92, .08);
    }

    .tabs {
      justify-self: center;
      display: flex;
      gap: 4px;
      background: #f1f5f9;
      padding: 4px;
      border-radius: 99px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      color: var(--text-muted);
      transition: all .2s;
    }

    .tab[aria-selected="true"] {
      background: #fff;
      color: var(--brand);
      box-shadow: var(--shadow-sm);
    }

    .tools {
      justify-self: end;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mobile-menu-btn {
      display: none;
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .mobile-menu-btn:hover {
      background: #f8fafc;
    }

    .mobile-menu-icon {
      width: 18px;
      height: 2px;
      background: var(--brand);
      position: relative;
      display: block;
    }

    .mobile-menu-icon::before,
    .mobile-menu-icon::after {
      content: '';
      position: absolute;
      left: 0;
      width: 18px;
      height: 2px;
      background: var(--brand);
    }

    .mobile-menu-icon::before {
      top: -6px;
    }

    .mobile-menu-icon::after {
      top: 6px;
    }

    .search-wrap {
      position: relative;
      width: min(360px, 34vw);
    }

    .search-row {
      display: none;
      justify-self: end;
    }

    .search {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 14px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }

    .search:focus {
      border-color: rgba(15, 45, 92, .35);
      box-shadow: 0 0 0 3px rgba(15, 45, 92, .10);
    }

    .chipbtn {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--brand);
      cursor: pointer;
    }

    .chipbtn:hover {
      background: #f8fafc;
    }

    .search-panel {
      position: absolute;
      top: 44px;
      right: 0;
      width: 520px;
      max-width: calc(100vw - 24px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: none;
    }

    .search-panel[data-open="true"] {
      display: block;
    }

    .search-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search-results {
      max-height: 360px;
      overflow: auto;
    }

    .sr-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
    }

    .sr-item:hover {
      background: #f8fafc;
    }

    .sr-top {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .sr-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--brand);
      font-weight: 700;
      font-size: 11px;
    }

    .sr-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 6px;
    }

    .sr-snippet {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      overflow: hidden;
    }

    /* Portal */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 26px 20px 60px;
    }

    #portal {
      flex: 1 0 auto;
    }

    .portal-section {
      display: none;
      animation: fadeIn .25s ease;
    }

    .portal-section[data-active="true"] {
      display: block;
    }

    .hero {
      background: linear-gradient(135deg, #fff 0%, #f8fafc 100%);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 34px;
      margin-bottom: 22px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero h2 {
      margin: 0;
      font-size: 26px;
      color: var(--brand);
      line-height: 1.25;
    }

    .hero p {
      margin: 0;
      color: var(--text-muted);
      max-width: 860px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 18px 0 12px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      transition: transform .15s, box-shadow .15s, border-color .15s;
      display: flex;
      flex-direction: column;
      height: 100%;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: #cbd5e1;
    }

    .card-kicker {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 800;
      margin: 0 0 8px;
      color: var(--brand);
      line-height: 1.35;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-action {
      margin-top: 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--brand);
      text-align: right;
    }

    /* Reader */
    .reader-container {
      display: none;
      background: var(--bg-reader);
      flex: 1 0 auto;
    }

    .reader-layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 36px;
      padding: 34px 20px 70px;
    }

    .reader-content {
      max-width: 820px;
      grid-column: 2;
      width: 100%;
      min-width: 0;
    }

    .reader-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .reader-title {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    /* Markdown */
    .markdown-body {
      color: #334155;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .markdown-body h1 {
      font-size: 30px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin: 0 0 26px;
      color: #0f172a;
    }

    .markdown-body h2 {
      font-size: 22px;
      margin-top: 42px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
      color: #0f172a;
    }

    .markdown-body h3 {
      font-size: 18px;
      margin-top: 28px;
      margin-bottom: 10px;
      color: #1e293b;
    }

    .markdown-body p,
    .markdown-body li {
      font-size: 16px;
      line-height: 1.85;
      margin: 0 0 14px;
    }

    .markdown-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: .92em;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      padding: 2px 5px;
      border-radius: 6px;
      color: #9d174d;
    }

    .markdown-body pre {
      background: #f8fafc;
      /* light */
      border: 1px solid var(--line);
      padding: 14px 16px;
      border-radius: 10px;
      overflow-x: auto;
      color: #0f172a;
    }

    .markdown-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--brand);
      background: var(--brand-light);
      padding: 14px 14px;
      margin: 20px 0;
      border-radius: 0 10px 10px 0;
      color: #334155;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
    }

    .markdown-body th {
      background: #f8fafc;
      font-weight: 700;
      text-align: left;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid var(--line);
      padding: 10px 12px;
    }

    /* TOC */
    .toc-sidebar {
      grid-column: 1;
      position: sticky;
      top: 88px;
      height: calc(100vh - 110px);
      overflow-y: auto;
      padding-left: 18px;
      border-left: 1px solid var(--line);
    }

    .toc-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .toc-list a {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 4px 0;
      border-left: 2px solid transparent;
      margin-left: -19px;
      padding-left: 17px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toc-list a:hover,
    .toc-list a.active {
      color: var(--brand);
      border-left-color: var(--brand);
    }

    .toc-h1 {
      font-weight: 800;
    }

    .toc-h2 {
      font-weight: 700;
    }

    .toc-h3 {
      margin-left: 12px;
    }

    .toc-group {
      margin: 8px 0;
    }

    .toc-h2-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toc-toggle {
      margin-left: auto;
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #ffffff;
      color: #334155;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .toc-toggle:hover {
      background: #f8fafc;
    }

    .toc-sub {
      margin: 6px 0 0 6px;
      padding-left: 10px;
      border-left: 1px solid #e2e8f0;
      display: none;
      /* collapsed by default */
    }

    .toc-group.open .toc-sub {
      display: block;
    }

    /* Tables: horizontal scroll on small screens */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 14px 0;
    }

    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
    }

    @media (max-width: 860px) {
      .table-wrap table {
        min-width: 720px;
      }

      .markdown-body th,
      .markdown-body td {
        white-space: nowrap;
      }
    }

    /* Mermaid: fit to content width (scroll only when truly wider) */
    .mermaid-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 14px 0;
    }

    .mermaid-wrap .mermaid {
      display: block;
      width: 100%;
    }

    .mermaid-wrap svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Anchor offset for sticky header */
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      scroll-margin-top: 92px;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--line);
      color: var(--text-muted);
      font-size: 12px;
      padding: 18px 0 22px;
      /* little gap at bottom */
      margin-top: auto;
    }

    .footer-inner {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .footer-note {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .02em;
    }

    @media (max-width: 860px) {
      .footer-inner {
        padding: 0 14px;
      }
    }


    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      background: var(--brand);
      color: #fff;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }

    .btn:hover {
      opacity: .92;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--line);
    }

    .btn-ghost:hover {
      background: #f8fafc;
      color: var(--text-main);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile TOC Drawer */
    .mobile-toc-btn {
      display: none;
    }

    .mobile-toc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 120;
    }

    .mobile-toc-overlay[aria-hidden="false"] {
      display: block;
    }

    .mobile-toc-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, .35);
    }

    .mobile-toc-panel {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: min(380px, 92vw);
      background: #fff;
      border-left: 1px solid var(--line);
      box-shadow: 0 20px 40px rgba(15, 23, 42, .18);
      display: flex;
      flex-direction: column;
    }

    .mobile-toc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .mobile-toc-title {
      font-weight: 800;
      color: var(--text-main);
      font-size: 13px;
      letter-spacing: .03em;
    }

    .mobile-toc-panel .toc-list {
      padding: 10px 10px 16px;
      overflow: auto;
    }

    .mobile-toc-panel .toc-list a {
      white-space: normal;
    }

    /* Mobile Menu Drawer */
    .mobile-menu-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 130;
    }

    .mobile-menu-overlay[aria-hidden="false"] {
      display: block;
    }

    .mobile-menu-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, .35);
    }

    .mobile-menu-panel {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: min(360px, 92vw);
      background: #fff;
      border-left: 1px solid var(--line);
      box-shadow: 0 20px 40px rgba(15, 23, 42, .18);
      display: flex;
      flex-direction: column;
    }

    .mobile-menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .mobile-menu-title {
      font-weight: 800;
      color: var(--text-main);
      font-size: 13px;
      letter-spacing: .03em;
    }

    .mobile-menu-body {
      padding: 14px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: auto;
    }

    .mobile-menu-section-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin: 4px 0;
    }

    .menu-tabs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-tab {
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      color: var(--brand);
      cursor: pointer;
    }

    .menu-tab[aria-selected="true"] {
      background: var(--brand-light);
      border-color: #cbd5e1;
    }

    @media(max-width: 1024px) {
      .topbar-inner {
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
      }

      .tabs {
        grid-column: 1 / -1;
        justify-self: start;
      }

      .tools {
        justify-self: end;
      }

      .search-wrap {
        width: min(520px, 92vw);
      }

      .reader-layout {
        grid-template-columns: 1fr;
      }

      .reader-content {
        grid-column: 1;
        max-width: 100%;
      }

      .toc-sidebar {
        display: none;
      }

      .mobile-toc-btn {
        display: inline-flex;
      }
    }

    @media(max-width: 640px) {

  <script nonce="NDEyNDE4MDgzMywyMjcxNjEzNjI=">
    const app = (function () {
      const state = {
        docs: { main: [], annex: [], appendix: [], policy: [] },
        currentTab: 'main',
        currentDocId: null,
        __activeTarget: null,
        __resizeWired: false,
        index: [] // search index
      };

      function safeMarkedParse(md) {
        const esc = (s) => (s || "").replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        try {
          if (window.marked && typeof window.marked.parse === 'function') {
            if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
              const out = window.marked.parse(md);
              // Sanitize rendered HTML to reduce XSS risk in public publishing.
              return window.DOMPurify.sanitize(out, { USE_PROFILES: { html: true } });
            }
            // DOMPurify unavailable: escape raw markdown instead of returning HTML.
            return '<pre>' + esc(md) + '</pre>';
          }
        } catch (e) { }
        // fallback: escape and show raw
        return '<pre>' + esc(md) + '</pre>';
      }

      function wrapTables(target) {
        if (!target) return;
        target.querySelectorAll('table').forEach(tbl => {
          if (tbl.closest('.table-wrap')) return;
          const wrap = document.createElement('div');
          wrap.className = 'table-wrap';
          tbl.parentNode.insertBefore(wrap, tbl);
          wrap.appendChild(tbl);
        });
      }

      function wrapMermaid(target) {
        if (!target) return;
        target.querySelectorAll('.mermaid').forEach(div => {
          if (div.closest('.mermaid-wrap')) return;
          const wrap = document.createElement('div');
          wrap.className = 'mermaid-wrap';
          div.parentNode.insertBefore(wrap, div);
          wrap.appendChild(div);
        });
      }

      function postProcessRendered(target) {
        // Horizontal scrolling for wide content
        wrapTables(target);
        wrapMermaid(target);
        normalizeMermaidSizing(target);
      }

      function normalizeMermaidSizing(target) {
        if (!target) return;
        target.querySelectorAll('.mermaid svg').forEach(svg => {
          // Normalize mermaid's explicit sizing so we can fit to the content width
          svg.removeAttribute('width');
          svg.removeAttribute('height');

          const wrap = svg.closest('.mermaid-wrap') || svg.parentElement;
          const available = wrap ? wrap.clientWidth : target.clientWidth;
          const viewBox = svg.getAttribute('viewBox');
          if (viewBox) {
            const parts = viewBox.split(/\s+/).map(Number);
            if (parts.length === 4 && !Number.isNaN(parts[2]) && parts[2] > 0 && available > 0) {
              const vbW = parts[2];
              const fitUp = vbW < (available * 0.98);
              svg.style.width = fitUp ? '100%' : `${vbW}px`;
              svg.style.maxWidth = fitUp ? '100%' : 'none';
              svg.style.height = 'auto';
              return;
            }
          }
          // Fallback: just fit to container
          svg.style.width = '100%';
          svg.style.maxWidth = '100%';
          svg.style.height = 'auto';
        });
      }

      function wireResponsiveSizing() {
        if (state.__resizeWired) return;
        state.__resizeWired = true;
        let t = null;
        window.addEventListener('resize', () => {
          clearTimeout(t);
          t = setTimeout(() => {
            if (state.__activeTarget) normalizeMermaidSizing(state.__activeTarget);
          }, 80);
        });
      }


      function getTextSummary(html, length = 140) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        const text = (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
        return text.slice(0, length) + (text.length > length ? '…' : '');
      }

      function getAbstractSummary(html, length = 140) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;

        const bTags = Array.from(tmp.querySelectorAll('.callout b, blockquote b'));
        const mark = bTags.find(b => (b.textContent || '').trim() === '要旨');
        if (!mark) return null;

        const callout = mark.closest('.callout') || mark.closest('blockquote') || mark.parentElement;
        if (!callout) return null;

        let text = (callout.textContent || callout.innerText || '').replace(/\s+/g, ' ').trim();
        text = text.replace(/^要旨\s*/, '').trim();
        if (!text) return null;

        return text.slice(0, length) + (text.length > length ? '…' : '');
      }

      function getHeaderOffsetPx() {
        const topbar = document.querySelector('.topbar');
        const h = topbar ? topbar.getBoundingClientRect().height : 0;
        return Math.ceil(h + 12);
      }

      function scrollToWithOffset(el, behavior = 'smooth') {
        if (!el) return;
        const y = el.getBoundingClientRect().top + window.scrollY - getHeaderOffsetPx();
        window.scrollTo({ top: Math.max(0, y), behavior });
      }

      function assignStableHeadingIds(container, doc) {
        if (!container || !doc) return;
        const heads = Array.from(container.querySelectorAll('h2, h3, h4'));
        heads.forEach((h, i) => {
          h.id = `${doc.id}-sec-${i}`;
        });
      }

      function getDocLabel(doc) {
        if (!doc) return '';
        if (doc.type === 'guide') return doc.title || 'ガイド';
        const kicker = (doc.displayKicker || doc.kicker || '').trim();
        const title = (doc.title || '').trim();
        if (!kicker) return title;
        if (!title) return kicker;
        if (kicker === title) return title;
        return `${kicker}　${title}`.trim();
      }

      function getDocHeadings(doc) {
        if (!doc) return [];
        if (doc.__headings) return doc.__headings;

        const html = safeMarkedParse(doc.raw);
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        const heads = Array.from(tmp.querySelectorAll('h2, h3, h4'));
        doc.__headings = heads.map((h, i) => ({
          tag: h.tagName,
          text: (h.textContent || '').replace(/\s+/g, ' ').trim(),
          id: `${doc.id}-sec-${i}`
        }));
        return doc.__headings;
      }

      function parseHeaderLine(line) {
        // returns {kind, kicker, title, raw}
        const s = line.trim();
        // 第1章 ... / 第12章 ...
        let m = s.match(/^##\s*(第\s*\d+\s*章)\s*(.*)$/);
        if (m) return { kind: 'chapter', kicker: m[1].replace(/\s+/g, ''), title: (m[2] || '').trim() || m[1].replace(/\s+/g, '') };
        // 補遺G：.... / 補遺G .... / 補遺：....
        m = s.match(/^##\s*(補遺\s*[A-ZＡ-Ｚ0-9]*)\s*[：:]?\s*(.*)$/);
        if (m) return { kind: 'annex', kicker: m[1].replace(/\s+/g, ''), title: (m[2] || '').trim() || m[1].replace(/\s+/g, '') };
        // 付録A ... / 付録A：...
        m = s.match(/^##\s*(付録\s*[A-ZＡ-Ｚ0-9]*)\s*[：:]?\s*(.*)$/);
        if (m) return { kind: 'appendix', kicker: m[1].replace(/\s+/g, ''), title: (m[2] || '').trim() || m[1].replace(/\s+/g, '') };
        return null;
      }

      function parsePolicyHeaderLine(line) {
        const s = line.trim();
        // ## 1. ... / ## 2. ...
        let m = s.match(/^##\s*(\d+)\.\s*(.*)$/);
        if (m) {
          const n = String(m[1] || '').trim();
          const title = (m[2] || '').trim();
          const kicker = n ? `第${n}章` : '制度';
          return { kicker, title: title || kicker };
        }
        return null;
      }

      // 1) Split markdown into structured docs
      function parseSource(rawText, policyRawText) {
        const raw = rawText || '';
        const lines = raw.split(/\r?\n/);

        // guide = everything until first major section header (chapter/annex/appendix)
        let current = {
          id: 'guide',
          type: 'guide',
          scope: 'main',
          kicker: 'GUIDE',
          title: 'ガイド・全体マップ',
          content: []
        };
        const bucket = [];

        for (const line of lines) {
          const h = parseHeaderLine(line);
          if (h) {
            bucket.push(current);
            const nextScope = (h.kind === 'chapter') ? 'main' : (h.kind === 'annex' ? 'annex' : 'appendix');
            current = {
              id: `${h.kind}-${bucket.length}`,
              type: h.kind,
              scope: nextScope,
              kicker: h.kicker,
              title: h.title,
              content: [line]
            };
          } else {
            current.content.push(line);
          }
        }
        bucket.push(current);

        // distribute
        state.docs = { main: [], annex: [], appendix: [], policy: [] };
        for (const s of bucket) {
          s.raw = s.content.join('\n').trim();
          if (s.id === 'guide') {
            state.docs.main.push(s);
          } else {
            state.docs[s.scope].push(s);
          }
        }

        // Note: Keep original kickers (e.g., 補遺A/補遺C/付録D) to match in-text references.

        const policyRaw = (policyRawText || '').trim();
        if (policyRaw) {
          const plines = policyRaw.split(/\r?\n/);
          const preamble = [];
          const pdocs = [];
          let pcurrent = null;
          let idx = 0;

          for (const line of plines) {
            const h = parsePolicyHeaderLine(line);
            if (h) {
              if (pcurrent) pdocs.push(pcurrent);
              idx++;
              const content = [];
              if (idx === 1 && preamble.length) content.push(...preamble);
              content.push(line);
              pcurrent = {
                id: `policy-${idx}`,
                type: 'policy',
                scope: 'policy',
                kicker: h.kicker,
                title: h.title,
                content
              };
            } else {
              if (!pcurrent) preamble.push(line);
              else pcurrent.content.push(line);
            }
          }
          if (pcurrent) pdocs.push(pcurrent);

          if (!pdocs.length) {
            state.docs.policy.push({
              id: 'policy-1',
              type: 'policy',
              scope: 'policy',
              kicker: '制度',
              title: '制度',
              raw: policyRaw
            });
          } else {
            pdocs.forEach(d => {
              d.raw = (d.content || []).join('\n').trim();
              delete d.content;
              state.docs.policy.push(d);
            });
          }
        }

        buildSearchIndex();
      }

      function normalizeAlphaKickers(scope, prefix) {
        const arr = state.docs[scope] || [];
        const base = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        arr.forEach((s, i) => {
          const letter = base[i] || (i + 1);
          s.displayKicker = `${prefix}${letter}`;
          s.originalKicker = s.kicker;
          // If title already contains the kicker, keep title; else title unchanged.
        });
      }

      function renderPortal() {
        const portal = document.getElementById('portal');
        portal.innerHTML = '';

        const tab = state.currentTab;
        const docs = state.docs[tab] || [];

        if (tab === 'main') {
          const guide = docs.find(d => d.type === 'guide') || docs[0];
          const chapters = docs.filter(d => d.type === 'chapter');

          if (guide) {
            const desc = '「決済をもう一度“分かる形”にする」というZenith構想の視点で、全体像→固定点→詳細の読み順を案内します。'
              + ' まずは“どこまでが確定で、どこからが未確定か”の境界線を掴むために、レーン×機能×確定点の地図を短時間で把握できるように整えました。';
            const hero = document.createElement('div');
            hero.className = 'hero';
            hero.innerHTML = `
          <div class="section-title">Start here</div>
          <h2>${escapeHTML(guide.title)}</h2>
          <p>${desc}</p>
          <div class="hero-actions">
            <button class="btn" onclick="app.openReader('${guide.id}')">ガイドを読む</button>
          </div>
        `;
            portal.appendChild(hero);
          }

          if (chapters.length) {
            const st = document.createElement('div');
            st.className = 'section-title';
            st.textContent = '本文（章）';
            portal.appendChild(st);

            const grid = document.createElement('div');
            grid.className = 'grid';

            chapters.forEach(ch => {
              const html = safeMarkedParse(ch.raw);
              const desc = getAbstractSummary(html, 120) || getTextSummary(html, 120);
              grid.insertAdjacentHTML('beforeend', `
            <div class="card" onclick="app.openReader('${ch.id}')">
              <div class="card-kicker">${ch.kicker}</div>
              <h3 class="card-title">${escapeHTML(ch.title)}</h3>
              <p class="card-desc">${escapeHTML(desc)}</p>
              <div class="card-action">読む →</div>
            </div>
          `);
            });
            portal.appendChild(grid);
          } else {
            // fallback: show all docs as cards
            const grid = document.createElement('div');
            grid.className = 'grid';
            docs.forEach(d => {
              const html = safeMarkedParse(d.raw);
              const desc = getAbstractSummary(html, 120) || getTextSummary(html, 120);
              grid.insertAdjacentHTML('beforeend', `
            <div class="card" onclick="app.openReader('${d.id}')">
              <div class="card-kicker">${d.kicker}</div>
              <h3 class="card-title">${escapeHTML(d.title)}</h3>
              <p class="card-desc">${escapeHTML(desc)}</p>
              <div class="card-action">読む →</div>
            </div>
          `);
            });
            portal.appendChild(grid);
          }
        } else {
          const label = (tab === 'annex') ? '補遺' : (tab === 'appendix' ? '付録' : (tab === 'policy' ? '制度' : tab));
          const st = document.createElement('div');
          st.className = 'section-title';
          st.textContent = label;
          portal.appendChild(st);

          const grid = document.createElement('div');
          grid.className = 'grid';

          docs.forEach(d => {
            const html = safeMarkedParse(d.raw);
            const desc = getAbstractSummary(html, 120) || getTextSummary(html, 120);
            const kicker = d.displayKicker || d.kicker;
            const kickerHtml = (kicker && kicker !== d.title)
              ? `<div class="card-kicker">${escapeHTML(kicker)}</div>`
              : '';
            grid.insertAdjacentHTML('beforeend', `
          <div class="card" onclick="app.openReader('${d.id}')">
            ${kickerHtml}
            <h3 class="card-title">${escapeHTML(d.title)}</h3>
            <p class="card-desc">${escapeHTML(desc)}</p>
            <div class="card-action">読む →</div>
          </div>
        `);
          });

          portal.appendChild(grid);
        }
      }

      function openReader(id, focusQuery = null) {
        // find doc
        let doc = null;
        for (const arr of Object.values(state.docs)) {
          const found = arr.find(d => d.id === id);
          if (found) { doc = found; break; }
        }
        if (!doc) return;

        document.getElementById('portal').style.display = 'none';
        document.getElementById('reader').style.display = 'block';
        window.scrollTo(0, 0);
        state.currentDocId = doc.id;

        document.getElementById('readerTitle').textContent = getDocLabel(doc);

        const target = document.getElementById('md-render-target');
        target.innerHTML = safeMarkedParse(doc.raw);
        assignStableHeadingIds(target, doc);
        state.__activeTarget = target;
        wireResponsiveSizing();
        renderGlobalToc(doc);

        // syntax highlight
        try {
          if (window.hljs) {
            target.querySelectorAll('pre code').forEach(el => {
              const cls = (el.className || '');
              if (cls.includes('language-mermaid') || cls.split(/\s+/).includes('mermaid')) return;
              window.hljs.highlightElement(el);
            });
          }
        } catch (e) { }

        const finalize = () => {
          postProcessRendered(target);

          if (focusQuery) {
            // naive: scroll to first match in text nodes
            const el = findFirstTextMatch(target, focusQuery);
            if (el) {
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }
        };

        // mermaid (render, then post-process sizing)
        try {
          if (window.mermaid) {
            // Convert ```mermaid``` / language-mermaid code blocks into <div class="mermaid">...</div>
            const codes = Array.from(target.querySelectorAll('pre > code'));
            codes.forEach(code => {
              const cls = (code.className || '');
              const isMermaid = cls.includes('language-mermaid') || cls.split(/\s+/).includes('mermaid');
              if (!isMermaid) return;
              const pre = code.parentElement;
              const div = document.createElement('div');
              div.className = 'mermaid';
              div.textContent = (code.textContent || '').trim();
              pre.replaceWith(div);
            });

            if (!state.__mermaidInited) {
              window.mermaid.initialize({ startOnLoad: false, theme: 'default' });
              state.__mermaidInited = true;
            }

            const nodes = target.querySelectorAll('.mermaid');
            // Mermaid v10+: run(); older: init()
            if (window.mermaid.run) {
              const p = window.mermaid.run({ nodes });
              if (p && typeof p.then === 'function') {
                p.then(finalize).catch(finalize);
                return;
              }
            } else {
              window.mermaid.init(undefined, nodes);
            }
          }
        } catch (e) { }

        finalize();
      }

      function findFirstTextMatch(root, q) {
        const query = (q || '').trim();
        if (!query) return null;
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
          const n = walker.currentNode;
          if ((n.nodeValue || '').toLowerCase().includes(query.toLowerCase())) {
            return n.parentElement;
          }
        }
        return null;
      }


      function renderGlobalToc(currentDoc) {
        const toc = document.getElementById('toc-list');
        const mtoc = document.getElementById('mobile-toc-list');
        if (!toc) return;

        const docs = state.docs[state.currentTab] || [];

        const renderInto = (container, closeOnNavigate) => {
          container.innerHTML = '';

          docs.forEach(d => {
            const isCurrent = !!(currentDoc && d.id === currentDoc.id);

            const group = document.createElement('div');
            group.className = isCurrent ? 'toc-group open' : 'toc-group';

            const row = document.createElement('div');
            row.className = 'toc-h2-row';

            const a = document.createElement('a');
            a.href = '#';
            a.textContent = getDocLabel(d);
            a.className = 'toc-h1';
            if (isCurrent) a.classList.add('active');

            const toggleBtn = document.createElement('button');
            toggleBtn.type = 'button';
            toggleBtn.className = 'toc-toggle';
            toggleBtn.textContent = group.classList.contains('open') ? '▾' : '▸';
            toggleBtn.setAttribute('aria-label', 'toggle subsections');

            const openGroup = () => {
              if (!group.classList.contains('open')) group.classList.add('open');
              toggleBtn.textContent = '▾';
            };

            toggleBtn.addEventListener('click', (e) => {
              e.preventDefault();
              e.stopPropagation();
              group.classList.toggle('open');
              toggleBtn.textContent = group.classList.contains('open') ? '▾' : '▸';
            });

            a.addEventListener('click', (e) => {
              e.preventDefault();
              if (!isCurrent) {
                openReader(d.id);
              } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
              }
              openGroup();
              if (closeOnNavigate) toggleMobileToc(false);
            });

            row.appendChild(a);
            row.appendChild(toggleBtn);

            const sub = document.createElement('div');
            sub.className = 'toc-sub';

            const allHeads = getDocHeadings(d).filter(h => h.text);
            const headings = (d.type === 'guide') ? allHeads : allHeads.slice(1);
            const rank = (tag) => ({ 'H2': 2, 'H3': 3, 'H4': 4 }[tag] || 9);
            const minRank = headings.length ? Math.min(...headings.map(h => rank(h.tag))) : 9;

            headings.forEach(h => {
              const link = document.createElement('a');
              link.href = `#${h.id}`;
              link.textContent = h.text;
              link.className = (rank(h.tag) === minRank) ? 'toc-h2' : 'toc-h3';

              link.addEventListener('click', (e) => {
                e.preventDefault();
                const go = () => {
                  const el = document.getElementById(h.id);
                  if (el) scrollToWithOffset(el);
                };

                if (!isCurrent) {
                  openReader(d.id);
                  setTimeout(go, 0);
                } else {
                  go();
                }

                openGroup();
                if (closeOnNavigate) toggleMobileToc(false);
              });

              sub.appendChild(link);
            });

            group.appendChild(row);
            group.appendChild(sub);
            container.appendChild(group);

            // Hide toggles for groups without sub items
            if (!headings.length) {
              sub.style.display = 'none';
              toggleBtn.style.visibility = 'hidden';
            }
          });
        };

        renderInto(toc, false);
        if (mtoc) renderInto(mtoc, true);
      }



      function toggleMobileToc(show) {
        const ov = document.getElementById('mobileTocOverlay');
        if (!ov) return;
        ov.setAttribute('aria-hidden', show ? 'false' : 'true');
        document.body.style.overflow = show ? 'hidden' : '';
      }

      function toggleMobileMenu(show) {
        const ov = document.getElementById('mobileMenuOverlay');
        if (!ov) return;
        ov.setAttribute('aria-hidden', show ? 'false' : 'true');
        document.body.style.overflow = show ? 'hidden' : '';
      }

      function goHome(forcePortal = false) {
        if (forcePortal || document.getElementById('reader').style.display === 'block') {
          document.getElementById('reader').style.display = 'none';
          document.getElementById('portal').style.display = 'block';
          window.scrollTo(0, 0);
        }
      }

      function switchTab(tab) {
        state.currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => {
          t.setAttribute('aria-selected', t.dataset.target === tab ? 'true' : 'false');
        });
        document.querySelectorAll('.menu-tab').forEach(t => {
          t.setAttribute('aria-selected', t.dataset.target === tab ? 'true' : 'false');
        });
        toggleMobileMenu(false);
        closeSearch();
        goHome(true);
        renderPortal();
      }

      function print() {
        window.print();
      }

      //  Search 
      function buildSearchIndex() {
        state.index = [];
        const push = (scope, doc) => {
          const html = safeMarkedParse(doc.raw);
          const text = stripText(html);
          state.index.push({
            scope,
            id: doc.id,
            title: doc.title,
            kicker: doc.kicker,
            displayKicker: doc.displayKicker || null,
            text
          });
        };
        for (const [scope, arr] of Object.entries(state.docs)) {
          arr.forEach(d => push(scope, d));
        }
      }

      function stripText(htmlStr) {
        const tmp = document.createElement('div');
        tmp.innerHTML = htmlStr;
        return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
      }

      function search(q) {
        const query = (q || '').trim();
        if (!query) return [];
        const ql = query.toLowerCase();
        const hits = [];
        for (const it of state.index) {
          const pos = it.text.toLowerCase().indexOf(ql);
          const posTitle = it.title.toLowerCase().indexOf(ql);
          if (posTitle !== -1 || pos !== -1) {
            const start = Math.max(0, (pos !== -1 ? pos : 0) - 40);
            const snippet = it.text.slice(start, start + 140);
            hits.push({ ...it, snippet });
          }
        }
        // sort: title match first
        hits.sort((a, b) => {
          const at = a.title.toLowerCase().includes(ql) ? 0 : 1;
          const bt = b.title.toLowerCase().includes(ql) ? 0 : 1;
          if (at !== bt) return at - bt;
          return a.snippet.length - b.snippet.length;
        });
        return hits.slice(0, 30);
      }

      function openSearch(panelId) {
        const panel = document.getElementById(panelId);
        if (panel) panel.dataset.open = 'true';
      }
      function closeSearch(panelId = 'searchPanel', resultsId = 'searchResults', metaId = 'searchMeta') {
        const panel = document.getElementById(panelId);
        if (panel) panel.dataset.open = 'false';
        const results = document.getElementById(resultsId);
        if (results) results.innerHTML = '';
        const meta = document.getElementById(metaId);
        if (meta) meta.textContent = '検索結果';
      }

      function renderSearch(q, panelId = 'searchPanel', resultsId = 'searchResults', metaId = 'searchMeta') {
        const results = search(q);
        const panel = document.getElementById(panelId);
        const box = document.getElementById(resultsId);
        if (!panel || !box) return;
        box.innerHTML = '';
        if (!q.trim()) {
          closeSearch(panelId, resultsId, metaId);
          return;
        }
        openSearch(panelId);
        const meta = document.getElementById(metaId);
        if (meta) meta.textContent = `${results.length} 件（上位表示）`;

        if (!results.length) {
          box.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:13px;">該当なし</div>`;
          return;
        }

        for (const r of results) {
          const scopeLabel = (r.scope === 'main') ? '本文' : (r.scope === 'annex' ? '補遺' : (r.scope === 'appendix' ? '付録' : '制度'));
          const kicker = r.displayKicker || r.kicker;
          const kickerText = (kicker && kicker !== r.title) ? kicker : '';
          const item = document.createElement('div');
          item.className = 'sr-item';
          item.innerHTML = `
        <div class="sr-top">
          <span class="sr-pill">${scopeLabel}</span>
          <span>${escapeHTML(kickerText || '')}</span>
        </div>
        <div class="sr-title">${escapeHTML(r.title)}</div>
        <div class="sr-snippet">${escapeHTML(r.snippet)}</div>
      `;
          item.addEventListener('click', () => {
            // switch tab to match scope
            const wantTab = r.scope;
            if (state.currentTab !== wantTab) {
              switchTab(wantTab);
            }
            closeSearch(panelId, resultsId, metaId);
            openReader(r.id, q);
          });
          box.appendChild(item);
        }
      }

      function escapeHTML(s) {
        return String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }

      function wireSearchInput(inputId, panelId, resultsId, metaId, wrapSelector) {
        const input = document.getElementById(inputId);
        if (!input) return;
        let t = null;
        input.addEventListener('input', () => {
          clearTimeout(t);
          t = setTimeout(() => renderSearch(input.value, panelId, resultsId, metaId), 120);
        });
        input.addEventListener('focus', () => {
          if (input.value.trim()) renderSearch(input.value, panelId, resultsId, metaId);
        });
        document.addEventListener('click', (e) => {
          const panel = document.getElementById(panelId);
          const wrap = document.querySelector(wrapSelector);
          if (panel && wrap && !wrap.contains(e.target)) {
            panel.dataset.open = 'false';
          }
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeSearch(panelId, resultsId, metaId);
        });
      }

      function relocateSearch() {
        const wrap = document.querySelector('[data-search-wrap]');
        const row = document.querySelector('.search-row');
        const tools = document.querySelector('.tools');
        if (!wrap || !row || !tools) return;
        const isMobile = window.matchMedia('(max-width: 640px)').matches;
        if (isMobile && wrap.parentElement !== row) {
          row.appendChild(wrap);
        } else if (!isMobile && wrap.parentElement !== tools) {
          tools.prepend(wrap);
        }
      }

      function wireSearch() {
        wireSearchInput('searchInput', 'searchPanel', 'searchResults', 'searchMeta', '.search-wrap');
      }

      // Init
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          if (window.marked && window.marked.setOptions) {
            window.marked.setOptions({ gfm: true, breaks: true });
          }
        } catch (e) { }

        let mainText = '';
        let policyText = '';
        try {
          const res = await fetch('zenith_public.md');
          if (res.ok) mainText = await res.text();
          const pRes = await fetch('zenith_policy.md');
          if (pRes.ok) policyText = await pRes.text();
        } catch(e) {
          console.error('Failed to fetch markdown sources', e);
        }

        parseSource(mainText, policyText);
        renderPortal();
        wireSearch();
        relocateSearch();
        try {
          const mq = window.matchMedia('(max-width: 640px)');
          if (mq && mq.addEventListener) mq.addEventListener('change', relocateSearch);
          else if (mq && mq.addListener) mq.addListener(relocateSearch);
        } catch (e) { }
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            toggleMobileToc(false);
            toggleMobileMenu(false);
          }
        });
      });

      return {
        switchTab,
        openReader,
        goHome,
        closeSearch,
        print,
        toggleMobileToc,
        toggleMobileMenu
      };
    })();
  </script>
