  <style>
    :root {
      --bg-body: #f4f7fb;
      --bg-card: #ffffff;
      --bg-reader: #ffffff;
      --brand: #0f2d5c;
      --brand-light: #eef2f9;
      --text-main: #1a202c;
      --text-muted: #64748b;
      --line: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, .05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, .10), 0 2px 4px -1px rgba(0, 0, 0, .06);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
    }

    img,
    svg {
      max-width: 100%;
      height: auto;
    }

    body {
      margin: 0;
      font-family: 'IBM Plex Sans', 'Zen Kaku Gothic New', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(1200px 700px at 10% -10%, #e7f2ff 0%, rgba(231, 242, 255, 0) 60%),
        radial-gradient(1000px 600px at 100% 0%, #e7fff3 0%, rgba(231, 255, 243, 0) 55%),
        var(--bg-body);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      min-height: 64px;
      padding: 8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-inner {
      width: 100%;
      max-width: 1200px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }

    .brand {
      justify-self: start;
      font-weight: 700;
      font-size: 18px;
      color: var(--brand);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .brand-badge {
      width: 18px;
      height: 18px;
      border: 2px solid var(--brand);
      border-radius: 999px;
      display: inline-block;
      box-shadow: inset 0 0 0 4px rgba(15, 45, 92, .08);
    }

    .tabs {
      justify-self: center;
      display: flex;
      gap: 4px;
      background: #f1f5f9;
      padding: 4px;
      border-radius: 99px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      color: var(--text-muted);
      transition: all .2s;
    }

    .tab[aria-selected="true"] {
      background: #fff;
      color: var(--brand);
      box-shadow: var(--shadow-sm);
    }

    .tools {
      justify-self: end;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mobile-menu-btn {
      display: none;
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .mobile-menu-btn:hover {
      background: #f8fafc;
    }

    .mobile-menu-icon {
      width: 18px;
      height: 2px;
      background: var(--brand);
      position: relative;
      display: block;
    }

    .mobile-menu-icon::before,
    .mobile-menu-icon::after {
      content: '';
      position: absolute;
      left: 0;
      width: 18px;
      height: 2px;
      background: var(--brand);
    }

    .mobile-menu-icon::before {
      top: -6px;
    }

    .mobile-menu-icon::after {
      top: 6px;
    }

    .search-wrap {
      position: relative;
      width: min(360px, 34vw);
    }

    .search-row {
      display: none;
      justify-self: end;
    }

    .search {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 14px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }

    .search:focus {
      border-color: rgba(15, 45, 92, .35);
      box-shadow: 0 0 0 3px rgba(15, 45, 92, .10);
    }

    .chipbtn {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--brand);
      cursor: pointer;
    }

    .chipbtn:hover {
      background: #f8fafc;
    }

    .search-panel {
      position: absolute;
      top: 44px;
      right: 0;
      width: 520px;
      max-width: calc(100vw - 24px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: none;
    }

    .search-panel[data-open="true"] {
      display: block;
    }

    .search-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search-results {
      max-height: 360px;
      overflow: auto;
    }

    .sr-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
    }

    .sr-item:hover {
      background: #f8fafc;
    }

    .sr-top {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .sr-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--brand);
      font-weight: 700;
      font-size: 11px;
    }

    .sr-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 6px;
    }

    .sr-snippet {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      overflow: hidden;
    }

    /* Portal */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 26px 20px 60px;
    }

    #portal {
      flex: 1 0 auto;
    }

    .portal-section {
      display: none;
      animation: fadeIn .25s ease;
    }

    .portal-section[data-active="true"] {
      display: block;
    }

    .hero {
      background: linear-gradient(135deg, #fff 0%, #f8fafc 100%);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 34px;
      margin-bottom: 22px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero h2 {
      margin: 0;
      font-size: 26px;
      color: var(--brand);
      line-height: 1.25;
    }

    .hero p {
      margin: 0;
      color: var(--text-muted);
      max-width: 860px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 18px 0 12px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      transition: transform .15s, box-shadow .15s, border-color .15s;
      display: flex;
      flex-direction: column;
      height: 100%;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: #cbd5e1;
    }

    .card-kicker {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 800;
      margin: 0 0 8px;
      color: var(--brand);
      line-height: 1.35;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-action {
      margin-top: 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--brand);
      text-align: right;
    }

    /* Reader */
    .reader-container {
      display: none;
      background: var(--bg-reader);
      flex: 1 0 auto;
    }

    .reader-layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 36px;
      padding: 34px 20px 70px;
    }

    .reader-content {
      max-width: 820px;
      grid-column: 2;
      width: 100%;
      min-width: 0;
    }

    .reader-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .reader-title {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    /* Markdown */
    .markdown-body {
      color: #334155;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .markdown-body h1 {
      font-size: 30px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin: 0 0 26px;
      color: #0f172a;
    }

    .markdown-body h2 {
      font-size: 22px;
      margin-top: 42px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
      color: #0f172a;
    }

    .markdown-body h3 {
      font-size: 18px;
      margin-top: 28px;
      margin-bottom: 10px;
      color: #1e293b;
    }

    .markdown-body p,
    .markdown-body li {
      font-size: 16px;
      line-height: 1.85;
      margin: 0 0 14px;
    }

    .markdown-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: .92em;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      padding: 2px 5px;
      border-radius: 6px;
      color: #9d174d;
    }

    .markdown-body pre {
      background: #f8fafc;
      /* light */
      border: 1px solid var(--line);
      padding: 14px 16px;
      border-radius: 10px;
      overflow-x: auto;
      color: #0f172a;
    }

    .markdown-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--brand);
      background: var(--brand-light);
      padding: 14px 14px;
      margin: 20px 0;
      border-radius: 0 10px 10px 0;
      color: #334155;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
    }

    .markdown-body th {
      background: #f8fafc;
      font-weight: 700;
      text-align: left;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid var(--line);
      padding: 10px 12px;
    }

    /* TOC */
    .toc-sidebar {
      grid-column: 1;
      position: sticky;
      top: 88px;
      height: calc(100vh - 110px);
      overflow-y: auto;
      padding-left: 18px;
      border-left: 1px solid var(--line);
    }

    .toc-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .toc-list a {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 4px 0;
      border-left: 2px solid transparent;
      margin-left: -19px;
      padding-left: 17px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toc-list a:hover,
    .toc-list a.active {
      color: var(--brand);
      border-left-color: var(--brand);
    }

    .toc-h1 {
      font-weight: 800;
    }

    .toc-h2 {
      font-weight: 700;
    }

    .toc-h3 {
      margin-left: 12px;
    }

    .toc-group {
      margin: 8px 0;
    }

    .toc-h2-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toc-toggle {
      margin-left: auto;
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #ffffff;
      color: #334155;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .toc-toggle:hover {
      background: #f8fafc;
    }

    .toc-sub {
      margin: 6px 0 0 6px;
      padding-left: 10px;
      border-left: 1px solid #e2e8f0;
      display: none;
      /* collapsed by default */
    }

    .toc-group.open .toc-sub {
      display: block;
    }

    /* Tables: horizontal scroll on small screens */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 14px 0;
    }

    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
    }

    @media (max-width: 860px) {
      .table-wrap table {
        min-width: 720px;
      }

      .markdown-body th,
      .markdown-body td {
        white-space: nowrap;
      }
    }

    /* Mermaid: fit to content width (scroll only when truly wider) */
    .mermaid-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 14px 0;
    }

    .mermaid-wrap .mermaid {
      display: block;
      width: 100%;
    }

    .mermaid-wrap svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Anchor offset for sticky header */
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      scroll-margin-top: 92px;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--line);
      color: var(--text-muted);
      font-size: 12px;
      padding: 18px 0 22px;
      /* little gap at bottom */
      margin-top: auto;
    }

    .footer-inner {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .footer-note {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .02em;
    }

    @media (max-width: 860px) {
      .footer-inner {
        padding: 0 14px;
      }
    }


    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      background: var(--brand);
      color: #fff;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }

    .btn:hover {
      opacity: .92;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--line);
    }

    .btn-ghost:hover {
      background: #f8fafc;
      color: var(--text-main);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile TOC Drawer */
    .mobile-toc-btn {
      display: none;
    }

    .mobile-toc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 120;
    }

    .mobile-toc-overlay[aria-hidden="false"] {
      display: block;
    }

    .mobile-toc-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, .35);
    }

    .mobile-toc-panel {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: min(380px, 92vw);
      background: #fff;
      border-left: 1px solid var(--line);
      box-shadow: 0 20px 40px rgba(15, 23, 42, .18);
      display: flex;
      flex-direction: column;
    }

    .mobile-toc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .mobile-toc-title {
      font-weight: 800;
      color: var(--text-main);
      font-size: 13px;
      letter-spacing: .03em;
    }

    .mobile-toc-panel .toc-list {
      padding: 10px 10px 16px;
      overflow: auto;
    }

    .mobile-toc-panel .toc-list a {
      white-space: normal;
    }

    /* Mobile Menu Drawer */
    .mobile-menu-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 130;
    }

    .mobile-menu-overlay[aria-hidden="false"] {
      display: block;
    }

    .mobile-menu-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, .35);
    }

    .mobile-menu-panel {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: min(360px, 92vw);
      background: #fff;
      border-left: 1px solid var(--line);
      box-shadow: 0 20px 40px rgba(15, 23, 42, .18);
      display: flex;
      flex-direction: column;
    }

    .mobile-menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .mobile-menu-title {
      font-weight: 800;
      color: var(--text-main);
      font-size: 13px;
      letter-spacing: .03em;
    }

    .mobile-menu-body {
      padding: 14px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: auto;
    }

    .mobile-menu-section-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin: 4px 0;
    }

    .menu-tabs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-tab {
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      color: var(--brand);
      cursor: pointer;
    }

    .menu-tab[aria-selected="true"] {
      background: var(--brand-light);
      border-color: #cbd5e1;
    }

    @media(max-width: 1024px) {
      .topbar-inner {
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
      }

      .tabs {
        grid-column: 1 / -1;
        justify-self: start;
      }

      .tools {
        justify-self: end;
      }

      .search-wrap {
        width: min(520px, 92vw);
      }

      .reader-layout {
        grid-template-columns: 1fr;
      }

      .reader-content {
        grid-column: 1;
        max-width: 100%;
      }

      .toc-sidebar {
        display: none;
      }

      .mobile-toc-btn {
        display: inline-flex;
      }

# Zenith Coordinator（ZC）

> 「決済を“ブラックボックス”ではなく、“説明できる状態の連なり”として扱うための基盤。」  
> — Zenith構想（構想文書より）

本書は、Zenith構想における **Zenith Coordinator（ZC）** の方式設計を、読み物として「全体像→固定点→詳細」の順に整理したガイドです。  
ZCは「巨大な中央台帳」ではなく、参加者間の決済を **状態（state）と証跡（evidence）** で説明可能にする協調層です。  

> <b>重要：本書はフィクションであり、実在のシステム・運用を示すものではありません。</b><br/>




## このシステムは何のシステムか
- **一言でいうと** ：銀行から別の銀行にお金を移動（決済）させるときに、複数の銀行の間で橋渡しをするシステム。
- **目的** ：決済を「後から説明できる状態の連なり」として扱い、利用者・事業者・当局のいずれに対しても、同じ取引番号で説明できるようにする。  
- **やること** ：受理→決定（Decision）→実施確認（Execution）→確定（b）までを、レーン別の契約として固定する。  
- **やらないこと** ：参加者の勘定系や口座管理を置き換えない（責任は参加者に残す）。



## 最初に頭へ入れる「全体マップ」（レーン×機能×確定点）

> **読み方（結論）** ：レーンは UX 分類ではなく、 **「同期境界」「不可逆境界（Finality＝b）」「証跡（Evidence）」「例外の収束先（CASE）」** を固定する **契約（contract）** である。  
> 本書は、各レーンを「決済の状態機械」として読めるように **確定点と証跡を先に固定** し、以降の章はその演繹（詳細）として配置する。


- 機能軸：`Ingress`（受付） / `Reservation`（H_RESERVED） / `Decision`（合意ログ） / `Execution`（参加者実行） / `Evidence`（証跡） / `CASE`（例外収束） / `Query`（説明）
- 確定点：`Decision`（合意ログのコミット） → `a`（支払人完了） → **`b`（受取人完了＝Finality）**

| レーン | 主用途 | 同期で返す境界 | 不可逆境界 | 典型例外の収束 | 最小証跡（例） |
| --- | --- | --- | --- | --- | --- |
| Express | 店舗・即時課金 | `INGRESS_ACCEPTED`（以降非同期） | **b** | REJECT または CASE | `decision_proof_ref`, `bank_proof_ref` |
| Standard | 説明可能な送金 | `DECISION_ACCEPTED` | **b** | CASE（誤送金等） | 同上＋ `reason_code` |
| High-Value | 高額即時（中銀） | `DECISION_ACCEPTED` | 中銀確定→b | CASE / HOLD | `cbrt_proof_ref` 等 |
| Bulk/Deferred | 締切・大量 | `INGRESS_ACCEPTED` | **b** | CASE / 再試行 | `cutoff_id`, `lsm_ref` |
| RTP | 請求 | `INGRESS_ACCEPTED` | **b** | CASE | `request_ref` |
| HTLC | 条件付き | `INGRESS_ACCEPTED` | 条件成立→b | 期限→自動収束 | `hashlock_ref`, `timelock` |
| gtid | 多者協調（Decision原子） | `GTID_ACCEPTED` | Decision確定（原子）／完了認定は全legのb一致 | CASE（部分進捗） | `gtid_ref`, `leg_refs` |

> 注意：表は **読み方の固定** が目的であり、実際のメッセージ・項目の正は第6章（I/F）および第10章（Evidence）に従う。


> <b>用語補足（協調＝Decision一体性）</b><br/>
> 本書でいう <b>協調（coordinated）</b> は、物理学的な“原子性”ではなく、<b>Decision（実施指示の確定）を同一の証跡で一体として扱う</b>ことを意味する。<br/>
> 一方、Execution（a/b）は参加主体内部の実施であり、ネットワーク/内部障害により<b>部分進捗</b>が起こり得る。したがって本書は、協調取引（gtid）においても <b>Executionの同時成立を保証しない</b>（全legのb一致のみを完了認定）ことを規範とする。


実務者が混乱しやすいのは、「何が同期で返り、何が確定で、いつ取消不能になるのか」が曖昧なときである。本書はこれを **レーン単位で固定** する。

| 区分 | 主用途 | 受付の同期応答 | 名義確認（宛先確認） | 支払人最終認可 | 確定点（不可逆境界） | 典型の運用観点 |
| --- | --- | --- | --- | --- | --- | --- |
| Express | 店舗・即時課金 | **Decisionまで同期** | PSPR参照（受取側起点） | 参加主体内で実施 | **b成立（PAYEE_EXEC_CONFIRMED）** | 拒否理由の明確化／再試行容易 |
| Standard | 通常送金 | 受理（Ingress）まで同期 | **口座情報→名義結果を提示** | **顧客の最終承認** | **b成立** | 誤送金抑止／説明可能性最大 |
| High-Value | 高額即時 | 受理まで同期 | **口座情報→名義結果を提示** | **顧客の最終承認** | **中央銀行決済確定→b成立** | 事故抑止（a→日銀→b）／再照合必須 |
| Bulk/Deferred | 企業一括 | 受理まで同期 | 任意（推奨） | BatchAuthorize（署名） | **b成立** | 成立率最大化／締切順守 |
| RTP | 請求 | 受理まで同期 | 請求データにより確定 | 顧客の承認/自動 | **Attempt成功→b成立** | 当日再挑戦／資金流入待ち |
| HTLC | 条件付き | 受理まで同期 | 標準に準拠 | 条件成立時のみ | **b成立** | 期限収束／secret非保持 |
| gtid | 多者束ね | 受理まで同期 | leg毎に準拠 | leg毎に準拠 | **全leg b成立でGT_FINAL** | 途中不整合の説明が最重要 |






## ZCの設計思想 10箇条

1. **SoT（唯一の正）は Finality Log** 。派生ビュー（Read Model）は捨てられる。  
2. **Decision と Execution は必ず分離** する（決める主体と実行する主体を分け、説明責任も分ける）。  
3. **不可逆境界は原則 b（PAYEE_EXEC_CONFIRMED）** 。b 後は取消不可、救済は Reversal（別取引）で行う。  
4. **説明できない状態は禁止** 。未決・不整合は必ず **SUSPENDED → CASE** に収束させる。  
5. **同期応答の意味は契約で固定** する（受理・拒否・後続の見通し）。  
6. **証跡は「後付け」しない** 。Decision／Execution／照会は同一の証跡連鎖で検証可能でなければならない。  
7. **レーンはUXではなく「確定点と証跡の契約」** である（Express/Standard/HV/Bulk/RTP/HTLC/gtid）。  
8. **H（仕向超過限度）を状態として管理** し、超過を論理的に発生させない。  
9. **危機対応（DNS_HOLD等）を例外ではなく制度化された状態遷移** として扱う。  
10. **全国システムの単一正本性は分散合意ログで担保** し、過半数喪失時は Read-only へ縮退して誤決定を防ぐ。




## Zenith 独自用語ミニディクショナリー

- **Finality Log** ：確定した事実だけを追記する「唯一の正本」。  
- **Read Model** ：照会・画面表示のための派生ビュー（捨てて再構築できる）。  
- **Decision** ：ZCが「成立」を決める行為（合意ログに記録される）。  
- **Execution** ：参加者（銀行等）が実際に資金移動を実行する行為（証憑を伴う）。  
- **a / b** ：a=支払人側完了（中間）、b=受取人側完了（不可逆の確定点）。  
- **Reversal** ：b後の救済。取消ではなく「別取引」で相殺・補正する。  
- **CASE** ：例外案件番号。未決・不整合を“案件”として追跡・収束させる単位。  
- **SUSPENDED** ：保留状態（例外案件＝CASEへ必ず接続する）。  
- **レーン（Lane）** ：UX分類ではなく「確定点と証跡の契約」で区分した取引クラス。  
- **Express / Standard / HV / Bulk / RTP** ：代表的レーン（本文の全体マップ参照）。  
- **gtid / leg** ：複数取引を束ねるグループIDと、その内訳取引。  
- **HTLC** ：条件成立でのみ確定する取引（期限・条件を状態として扱う）。  
- **H（仕向超過限度）** ：仕向側の送金限度。`H_reserved` / `H_locked` として状態管理する。  
- **DNS** ：日次ネット清算（Daily Netting Settlement）。  
- **IGS** ：即時グロス清算（Immediate Gross Settlement：高額系）。  
- **igs_mode** ：DNS_HOLD等の危機モード中にIGSを段階的に制御する運用状態（STOP/RINGFENCED/RINGFENCED_PLUS）。  
- **dns_recovery_reserve** ：DNS復旧のために確保すべきリザーブ（ZCが算式によりリアルタイム算定し、`reserve_explain_hash` と `reserve_confidence` を証跡化）。  
- **DNS_HOLD / IGS_HOLD** ：清算側都合で“確定が先送りになる”制度化された状態。  
- **SoT** ：System of Truth（唯一の正本）。本書では Finality Log。  
- **Invariants** ：破ってはいけない不変条件（例：二重確定禁止、b後取消禁止）。  
- **Read-only 縮退** ：過半数喪失などで誤決定を避けるため、決定を止め照会のみ許す。  
- **WORM** ：追記のみ・改ざん困難な保管（監査・訴訟耐性のための長期保全）。



## 全体マップ（レーン×機能×確定点）

**読むときのコツ：** 最初に「どこで *決まる* か（Decision）」「どこで *不可逆* になるか（b）」「例外がどこへ収束するか（CASE）」だけを追う。

| 観点 | 固定点（要約） |
| --- | --- |
| レーン | Express / Standard / High-Value / Bulk・Deferred / RTP / HTLC / gtid |
| 同期境界 | 「受理（Ingress）」までか、「Decision確定」までかはレーン契約で固定 |
| 不可逆境界 | 原則 b。HVは「中央銀行清算確定→b」を例外として扱う |
| 例外収束 | 未決・矛盾は SUSPENDED → CASE（番号で追跡） |
| 証跡 | decision_proof_ref / bank_proof_ref を中心に、照会と監査が同じ根拠に収束 |





## 第1章 システムの設計思想と社会的意義

> <b>要旨</b><br/>
> 本章では、ZCを「決済の基盤OS」として位置づけ、説明可能性を最上位の設計規範に置く理由を述べる。対象/非対象を事務起点で切り分け、高額即時レーンの誤解ポイントと、レーン×確定点の全体マップを提示する。


### 1.1 社会的意義（本システムの位置付け）
本システムは、日本の決済インフラを **「事務レス・安全・低廉」** を中心価値として再設計する「決済の基盤OS」である。  
FinTechが個別に実装してきた機能（即時送金、店舗決済、請求（RTP）、条件付き決済、照会・トレーサビリティ）を、 **国家級の共通基盤** として共通化し、制度・監督・監査・訴訟耐性を持つ形で提供する。

> <b>設計規範（最上位の固定点）</b><br/>
> (1) 実装できる（分散システムとして成立）／(2) 運用できる（障害・例外を状態化）／(3) 事務が回る（照会・訂正・証跡）／(4) 当局説明ができる（監督・監査・利用者照会）を、機能要件より上位の「設計規範」とする。


### 1.2 業務スコープ（対象・非対象：事務起点で固定）
本書で扱うZCは、参加主体（銀行・決済サービス）が提供する送金・決済を、 **「受理 → 決定（Decision）→ 実施確認（Execution）→ 確定」** の状態機械として統一し、照会・証跡・例外処理を共通化する。

ここで重要なのは、ZCが **参加主体の内部勘定処理そのものを置き換えるのではなく** 、参加主体間の取引を「説明できる形で前に進める」ための **協調層（Coordinator）** である、という点である。

#### 1.2.1 本書の対象（ZCが責任を持って規範化する範囲）
- **Express** ：店舗・即時課金（PSPR参照で宛先確定、受付結果を同期で返す）
- **Standard** ：名義確認（宛先確認）→支払人の最終認可→実施（最も説明可能性が高い）
- **Bulk / Deferred** ：締切ウィンドウ＋流動性節約（LSM）により当日成立率を最大化
- **RTP（請求）** ：実行日まで資金拘束しない請求スキーム（当日Attempt複数回（所定上限））
- **HTLC（条件付き留保）** ：hashlock＋timelockにより「成立前不確実性」を状態化
- **協調取引（gtid：束ね協調）** ：複数legの同時成立“に近い”振る舞いを提供（DNS領域で提供）
- **DNS（Daily Netting Settlement：日次ネット清算）** ：ZCが日次のネット明細を束ねて中央銀行へ清算依頼（Kick）し、中央銀行内部で協調清算（内部gtid相当）を実行
- **高額即時レーン連携** ：高額閾値に該当する取引は、ZCが **中央銀行の決済までルーティング** し、結果を状態化する

#### 1.2.2 本書の非対象（参加主体側の責任として吸収する範囲）
- 顧客認証・本人確認・与信・限度管理の基準（各参加主体の裁量）
- 勘定系（LMS/Core）の内部方式（モダン／レガシーの差異は参加プロファイルで吸収）
- 返品・相殺・商流都合の判断（ただし「救済取引」起票の方式は規範化）
- 外部台帳（DLT等）との直接連携（将来拡張の余地として扱い、本書の規範対象外）

#### 1.2.3 高額即時レーンの扱い（誤解防止）

> <b>設計規範（高額即時の事故抑止：HVは“外部清算フェーズ”を明示）</b><br/>
> 高額即時レーンでは、支払銀行内で<b>顧客口座から清算専用中継勘定へ資金を隔離</b>した完了点を <b>a_HV</b> と呼ぶ。<br/>
> 状態機械の爆発を避けるため、外形上は <code>PAYER_EXEC_CONFIRMED(a)</code> と同一状態で扱い、<b>証憑の<code>proof_type</code></b>（例：<code>PAYER_HV_ISOLATION_PROOF</code>）でa_HVを区別する。<br/>
> ただし、<b>中銀決済（IGS）の進行状況はRead Model属性として明示</b>し、混同を禁止する：<code>external_settlement_status = NONE|REQUESTED|SETTLED|FAILED|HOLD</code>。<br/>
> ZCは <code>PAYER_HV_ISOLATION_PROOF</code> を受領した場合のみ中銀決済を起動し、以後の遷移は次の不変条件に従う：<br/>
> <b>不変条件</b>：高額即時レーンで <code>PAYEE_EXEC_CONFIRMED(b)</code> へ遷移してよいのは <code>external_settlement_status == SETTLED</code> の場合に限る。<br/>
> 中銀側で不成立（FAILED/HOLD）が確定した場合は、支払銀行が隔離資金を<b>内部手続で復元</b>し、その証跡（例：<code>EXT_REFUND_PROOF</code>）を提出して収束させる（銀行間Reversalの前提にしない）。

- 高額即時レーンは **Standardを拡張した規範フロー** として扱い、名義確認・AML/制裁スクリーニング・支払人最終認可を必須化する。
- **a（PAYER_EXEC_CONFIRMED）成立後にのみ** 、ZCが中央銀行決済を起動（Kick）し、決済結果の確定後にb（PAYEE_EXEC_CONFIRMED）へ進める（事故抑止：第4章）。
- 中央銀行側の内部方式（オペレーション・台帳構造）は本書の規範対象外とし、ZCは **依頼・冪等・結果の状態化** を規範として固定する。



### 1.3 用語と責任分界の最初の地図（事務・実装の混線防止）

#### 1.3.1 主要な登場主体
- **Client / Channel** ：支払人アプリ、企業の支払システム、受取側POS等（利用者接点）
- **Participant Edge/API** ：参加主体がZCと接続するためのゲートウェイ（認証・署名・冪等制御を含む）
- **ZC** ：受理・検証・レーン制御・Decision確定・状態遷移・照会の中核
- **Bank LMS/Core** ：参加主体の勘定系（Ledger / Core Banking）。モダン／レガシーいずれも参加可能

#### 1.3.2 よく誤解される用語（先に固定）
- **LMS** ：ここでは「勘定系（残高・仕訳・内部決済）」を指す。ZCはLMSを置き換えない。
- **PermitSig** ：受取側（B）が「この受取条件で受けることを許諾した」ことを示す署名。
  - **意味するのは“許諾の証拠”のみ** であり、B内部の与信・在庫・審査完了を意味しない（判断基準は参加主体側）。
- **Decision（DECIDED_TO_SETTLE / DECIDED_CANCEL）** ：ZCが「実施指示を出すこと」を確定した境界（Raftコミットで立証）。
- **Execution（a/b）** ：参加主体が実施したことを証憑で示す境界。
  - **a** ：PAYER_EXEC_CONFIRMED（支払側の実施完了）
  - **b** ：PAYEE_EXEC_CONFIRMED（受取側の利用可能化＝弁済完了）
- **DLQ（Dead Letter Queue）** ：非同期のcmd/eventが所定回数リトライしても処理できない場合の退避キュー。
  - ZC/参加主体のいずれのDLQも、 **CASE起票に接続** し、"放置されない" ことを規範とする（第12章）。

#### 1.3.3 POSはどこと繋がるのか（接続モデル）
- POS（受取側端末）が **支払側銀行（PayerBank）と直接接続する設計は採らない** 。
- 店舗決済では、受取側（加盟店/GW/PayeeBank）がPSPRを発行し、支払人は **自分の銀行アプリ等（Client）** から `pspr_ref` を提示して支払を起動する。
- 受取側が支払側から得る情報は最小限とする（例： **参照番号／状態／入金可否** ）。個人情報や口座情報をPOSへ露出させない。



## 第2章 全体アーキテクチャ概要

> <b>要旨</b><br/>
> 本章では、Finality Logを唯一の正として据え、非同期配送とRead Model派生で全国規模の可用性・コストを両立する全体アーキテクチャを示す。多拠点合意（Raft）とRead-only縮退の考え方、データ分離、外部清算（DNS/IGS）との接続ポイントを整理する。


### 2.1 アーキテクチャの基本方針（規範）
- **正（Source of Truth）** ：ZCの **Finality Log群（シャード単位の追記ログ）** を唯一正とする。  
- **通信** ：ZC⇔参加行は非同期（Kafka/MQ等、at-least-once）。同期APIは「受付結果（受理/拒否）」までに限定。  
- **状態** ：Decision（ZC決定）とExecution（銀行実施確認）を分離し、Read Modelで分離表示する。  
- **レーン** ：Express / Standard / Bulk / Deferred を分離し、SLA・運用・例外をレーン単位で固定する。  
- **安全弁** ：H（仕向超過限度）は **絶対超過禁止** 。 **H_reserved/H_locked** をFinality Logで管理する。

### 2.2 コンポーネント構成
```mermaid
flowchart LR
  C["Client / Channel"] -->|sync| B["Participant Edge/API"]
  B --> IG["ZC Ingress / Validation"]
  IG --> LO["Lane Orchestrators"]

  LO --> FL1["Finality Log (Raft) Payer Shards"]
  LO --> FL2["Finality Log (Raft) GTID Shards"]
  LO --> BUS["Command/Event Bus (Kafka/MQ)"]

  BUS --> RMB["Read Model Builder"]
  RMB --> Q["Query API / Dashboard"]

  LO --> VA["Vault (short-lived)"]
  LO --> OPS["Ops Workflow / CASE"]
  LO --> TR["Trust Registry"]
  LO --> CAP["Express Capability Registry"]

  BUS -->|async cmd| AD["Bank Adapter / Connector"]
  AD --> CORE["Bank LMS/Core"]
  CORE --> AD
  AD -->|async event| BUS
```


### 2.3 多拠点・可用性（規範）

#### 2.3.0 参照アーキテクチャ（全国システム：合意ログ＋バックアップセンター永続化）

本システムの強みは、 **Finality Log（Decision を記録する追記ログ）を単一の正（SoT）** とし、これを **地理分散の合意（Raft／代替として Multi-Paxos）** により確定させる点にある。  
したがって「全国システムとしての永続化」は、一般論ではなく **Decision の確定条件そのもの** である。

**固定点（規範）**
- `Decision` は、当該シャードの **合意ログがコミット（quorum 到達）** した時点でのみ成立する（以後、再起動・再構築でも揺らがない）。
- 合意ログの投票メンバーは、 **主系拠点とバックアップ拠点（DR）を跨いで配置** し、単一拠点喪失でも quorum を維持できること。
- quorum 喪失時は、誤決定を避けるため **Read-only（照会のみ）へ縮退** し、新規 Decision は行わない（レーン別の拒否規範は第9章）。

**参照配置（例）**
- 3 拠点（東日本DC／西日本DC／DR）× 各拠点 1 投票ノード（合計 3）  
  - 1 拠点喪失でも 2/3 の quorum を維持
- 5 ノード構成の場合は、主系 2 拠点 + DR に跨る配置とし、常に **過半数が“地理的に分散”** していることを保証

```mermaid
flowchart LR
  subgraph East["東日本DC"]
    E1["Voting Node (Shard k)"]
  end
  subgraph West["西日本DC"]
    W1["Voting Node (Shard k)"]
  end
  subgraph DR["バックアップセンター（DR）"]
    D1["Voting Node / Witness (Shard k)"]
  end

  E1 <-- "AppendEntries / Propose" --> W1
  W1 <-- "AppendEntries / Propose" --> D1
  D1 <-- "AppendEntries / Propose" --> E1

  E1 --> Q["Commit (Quorum)"] 
  W1 --> Q
  D1 --> Q
```

> **補足**
>合意方式の教科書的説明は行わず、本書では「 **Decision は地理分散 quorum のコミットでのみ成立** 」という規範を固定する。実装詳細（membership 変更、snapshot、log compaction 等）は付録 H を正とする。

- **3地域×3AZ（例：東京・大阪・福岡×各3AZ）Active-Active** を前提とし、任意の1地域喪失でも継続可能に設計する。  
- Raftは **シャードごと** に構成し、過半数に到達できない場合は **Read-onlyへ遷移** （両側書込み禁止）する。  
- Express（POS用途）は Read-only時に原則REJECT（誤決定防止）。Standard/Bulkも **永続化不可（過半数喪失）** の場合はREJECTし、参加行側での再送・繰越で吸収する。

### 2.4 データの分離（ログ／照会／秘匿）
- **Finality Log** ：規範上の確定記録。監査・復旧の根拠。  
- **Read Model** ：照会用派生ビュー。破棄してもログから再構築できる。  
- **Vault** ：短期秘匿（AML評価等）。本体は削除しても、参照証跡（vault_ref、参照ハッシュ等）はログに残す。

### 2.5 高額即時レーン/IGS/DNSの整理（設計上の境界）

本基盤は、 **取引の完了（顧客視点の完了）** と、 **参加主体間の資金精算（参加主体視点の精算）** を混同しない。
特に「高額即時レーン」における清算は、日次ネット清算（DNS）とは別物であり、用語・状態・照会応答を明確に分離する。

#### 2.5.1 IGS（Immediate Gross Settlement：高額即時清算）
- **IGS = Immediate Gross Settlement（即時グロス清算）** ：高額即時レーンにおいて、ZCが **元取引の一部として** 清算依頼を起動し、結果を前提条件として b を成立させる。
- 高額即時レーンの規範順序は **a_HV → IGS確定 → b** （事故抑止のため固定）。
  - **a_HV** ：支払銀行内で「顧客口座→清算専用中継勘定」へ資金を隔離した完了点（状態はaと同一、証憑の `proof_type=PAYER_HV_ISOLATION_PROOF` で区別）。
  - **IGS確定** ：清算サービス側での振替確定（`boj_settle_ref` 等で証跡化）。
  - **b** ：受取銀行での入金完了（弁済完了の外形）。

#### 2.5.2 DNS（Daily Netting Settlement：日次ネット清算）
- **DNS = Daily Netting Settlement（日次ネット清算）** ：低コスト・運⽤整合を両⽴する基盤の基本。ZCは当日取引群を日次でネッティングし、参加主体の **ネット勝ち負け（純受取／純支払）** を確定する。
- **Kick（起動）はZCが実施（初回のみ）** ：営業⽇ごとに定めたカットオフ（例：16:30）で、ZCが当⽇分DNSサイクルを閉じ、 **DNS清算依頼（ネット明細＋digest）** を発行する。
- **再処理（再Kick相当）は清算サービス側で自動** ：資金手当て（市場調達／貸付）を最速に検知できる主体が清算サービス側であるため、HOLD解除後の再処理は清算サービス側で自動的に実行され、その結果のみがZCへ通知される。
- **中断（HOLD）の実体（内部要因）** ：参加主体が清算サービス側に保持する残高不足等により、DNS清算が完了できない状態として表現する。
- **事務必須の照会** ：参加主体は当日DNSについて、ZC照会で以下を取得できなければ運用が回らない。
  - 当日ネットポジション（純支払/純受取、金額）
  - DNSサイクル状態（OPEN / KICKED / SETTLED / HOLD_ACTIVE）
  - as_of（鮮度）/ watermark / next_action_hint（次アクション）

#### 2.5.3 重要（顧客影響の整理：規範）
- **高額即時レーン（IGS）** ：IGSは元取引の一部である。
  - IGSがHOLDの場合、元取引は `SUSPENDED`（b未成立）であり、顧客視点でも「未完了」として扱う。
- **通常レーン（Express/Standard/Bulk/RTP/HTLC/gtid）** ：DNSは元取引の完了後に実行される参加主体間精算である。
  - DNSがHOLDの場合でも、元取引は `SETTLED` のままであり、顧客視点で「未完了」に見せてはならない。

> **設計規範（対外説明の安全性）**
>DNS HOLD/IGS HOLD を理由に、顧客向け画面で「資金不足」等の表現を用いてはならない。
>ZCは `public_message_id`を参加主体へ提示するのみで、顧客への直接表示は行わない。
>顧客向け表示は参加主体が行い、必要に応じて以下のように<b>ぼかしたテンプレ</b>を用いる。
>例：「現在、一部のお振込処理が一時的に遅延しています」



## 第3章 関係主体と責任分界

> <b>要旨</b><br/>
> 本章では、ZCと参加者（銀行等）の役割を「決める／実行する／説明する」で分離し、責任分界をRACIで固定する。認証・残高・与信は参加者責任に残しつつ、照会・証跡・例外収束を共通化することで、監督・監査・利用者説明の前提を整える。


### 3.1 関係主体（ロール）
- **ZC（Zenith Coordinator）** ：取引の受理・検証・決定（Decision）・指図生成・証跡管理・照会基盤・運用統制。  
- **参加行（Payer/Payee Bank）** ：顧客口座の管理、本人意思確認、残高判定、Execution（a/b）証憑の発行、顧客説明。  
- **LMS（Liquidity Management System）** ：当座・日中当座・流動性の管理（銀行内部）。  
- **CMS（Customer Management System）** ：顧客接点（受付、通知、照会UI、同意取得）。  
- **加盟店/決済GW（Express）** ：PSPR（署名付き受取人情報）生成。  
- **監督当局** ：制度合意、モニタリング、照会、監督上の要求の提示。

### 3.2 責任分界の原則（規範）
- **正の決定点はZC** 、 **口座・資金状態のオーナーは参加行** 。  
- **過失者責任** を原則とし、原因特定可能な場合は当該主体が責任を負う。  
- ただし、社会インフラとしての利用者保護のため、制度・約款で **補償・免責・求償** を明確化する（第13章）。

### 3.3 RACI（責任分界）— 最小十分表
| 事項 | ZC | 参加行（仕向） | 参加行（被仕向） | 加盟店/GW | 当局 |
| --- | --- | --- | --- | --- | --- |
| 受付/形式検証 | R/A | C | C | C | - |
| Decision確定（DECIDED_*） | R/A | C | C | - | - |
| H予約/制限 | R/A | C | C | - | - |
| 本人同意・残高判定 | - | R/A | - | - | - |
| PAYER_EXEC_CONFIRMED（a証憑） | - | R/A | - | - | - |
| PAYEE_EXEC_CONFIRMED（b証憑） | - | - | R/A | - | - |
| PSPR署名（Express） | - | C | R | R/A | - |
| 監査ログ保全（Finality Log） | R/A | C | C | - | - |
| 証憑（bank_proof_ref）発行 | - | R/A | R/A | - | - |
| CASE起票・例外収束 | R/A | R | R | - | C |
| 障害時の説明（対外説明） | R/A | R | R | - | C |

### 3.4 PermitSig / Authority Check（AML/制裁）の位置付け（規範）
- **PermitSig** ：銀行内サブシステムが「許諾した」ことを示すシグナル。判定基準は本基盤の対象外。  
- **Authority Check（AML/制裁）** ：必要時に署名付きOK/NG応答（または参照番号）を取得し、Finality Logに証跡化する。  
- 本基盤が取り扱うのは **照会・結果・証跡** であり、判定ロジックを中央に寄せない（責任分界の明確化）。

> **設計の狙い**
>「誰が判断したのか」を曖昧にしないことで、監督・監査・訴訟・対外説明時に説明可能な責任分界を実現し、結果として事務を回す。



## 第4章 業務フロー（正常系・例外系・障害系）

> <b>要旨</b><br/>
> 本章では、各レーンの正常系フローと、例外/障害時にどう状態化して収束させるかを図解する。同期応答の語義（INGRESS_ACCEPTED / DECISION_ACCEPTED）を固定し、取消と失敗、DNS_HOLD/IGS_HOLDと顧客影響の混同を防ぐ。


### 4.1 共通前提（規範）

> **設計規範（Read-only時の再送嵐防止）**
>Read-only（過半数喪失等）では永続化できないため、ZCは `REJECT_UNAVAILABLE` を返す。
>ただし参加行が即時リトライすると再送嵐となるため、応答には必ず `retry_after_ms` と `recommended_backoff_policy` を含め、参加行はCircuit Breakerに従う。

- 受付APIは **同期で受理/拒否** を返すが、 **決定（Decision）と実施確認（Execution）は原則非同期** 。  
- 同期応答は2段階に分けて語義を固定する。  
  - **INGRESS_ACCEPTED** ：入力が妥当で、かつ **RECEIVED（受領記録）がFinality Logへ永続化済み** であること（= 返した参照が消えない）。`ingress_ref` を返す。Decisionは未確定。  
  - **DECISION_ACCEPTED** ： **Decision（Raftコミット）まで完了** し、`decision_proof_ref` が発行済みであること（= 決定の立証が可能）。  
- Expressは原則 `DECISION_ACCEPTED` を返す（店舗要件）。Standard/Bulk/HTLC/gtidは原則 `INGRESS_ACCEPTED` を返し、Decisionは後続イベント/照会で確定する。  
- **Read-only（シャード過半数喪失/基盤不可用）では永続化できないため、INGRESS_ACCEPTEDは返さず** `REJECT_UNAVAILABLE` / `REJECT_READONLY` を返す（参照番号なし、リトライ前提）。  
- 外部照会待ち・窓口保留・高額即時レーン介在等の **業務都合の停止** は、INGRESS_ACCEPTED後に `PRECHECKED_SUSPENDED` / `SUSPENDED` へ遷移し、`reason_code` と `next_action_hint` で説明する。  
- 顧客向け表示は a/b（第8章）を分離し、 **取消（CANCELLED）と失敗（FAILED_EXECUTION）を混同しない** 。  
- 例外は **CASE** として起票し、番号で照会導線を固定する（第12章）。

> **監査上の狙い**
>同期応答の語義を固定し、「いつ受理し」「いつ決め」「いつ実施が確定したか」を時系列で説明できるようにする。



### 4.2 正常系フロー一覧（レーン別）


#### 4.2.0 図解：基本送金類型（5類型）【規範補助図】

以下は、文章だけでは理解しづらい「典型フロー」を **5類型（Express / Standard / Bulk / HTLC / gtid）** に整理したものである。
本図は **外部設計の理解補助** を目的とし、厳密な契約は **I/F契約（付録A）と状態機械（第5章）** を正とする。

> 記号：`a`＝PAYER不可逆確定（PAYER_EXEC_CONFIRMED）／`b`＝PAYEE不可逆確定（PAYEE_EXEC_CONFIRMED）



#### (1) Express（店舗・即時課金：PSPR参照で宛先確定／受付結果を同期で返す）

  participant Z as ZC(API/Orch)

  POS->>RB: PSPR_REGISTER(pspr_payload)
